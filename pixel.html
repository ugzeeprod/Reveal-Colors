<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Pixel Cannon — Stitch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Outfit:wght@400;600;800&display=swap');

  :root {
    --cell: min(3.2vw, 22px);
    --gap: 1px;
    --bg: #0d0e13;
    --panel: #16171e;
    --surface: #1e1f28;
    --text: #eaeaf2;
    --muted: #7a7e8f;
    --accent: #ff6b4a;
    --success: #4ade80;
    --danger: #f87171;
    --col-W: #f0f0f0;
    --col-DB: #14288C;
    --col-LB: #28AADC;
    --col-P: #F0AAB4;
    --col-K: #141414;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: 'Outfit', sans-serif;
    overflow: hidden; height:100vh; height:100dvh;
  }

  .app {
    display:flex; flex-direction:column;
    height:100vh; height:100dvh;
    max-width:520px; margin:0 auto;
  }

  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 14px; flex-shrink:0;
  }
  .header h1 {
    font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:700;
    background:linear-gradient(135deg,#28AADC,#F0AAB4,#ff6b4a);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .stats { display:flex; gap:12px; font-size:.75rem; color:var(--muted); }
  .stats b { color:var(--text); }
  .stats .hl { color:var(--success); font-weight:700; }

  .grid-section {
    flex:1 1 auto;
    display:flex; align-items:center; justify-content:center;
    padding:2px 8px; min-height:0; overflow:hidden;
  }

  .grid-outer {
    position:relative;
    background:var(--panel); border-radius:14px; padding:14px;
    box-shadow:0 6px 24px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.04);
  }
  .rail-border {
    position:absolute; inset:4px;
    border:3px solid #2a2c38;
    border-radius:11px; pointer-events:none; z-index:5;
    transition:border-color 300ms;
  }
  .rail-border.active { border-color:var(--accent); }

  .grid {
    display:grid;
    grid-template-columns:repeat(20,var(--cell));
    grid-auto-rows:var(--cell);
    gap:var(--gap); position:relative; z-index:1;
  }

  .gc { border-radius:2px; position:relative; background:#2a2b33; }
  .gc.gW  { background:#3a3b44; }
  .gc.gDB { background:#14288C22; }
  .gc.gLB { background:#28AADC22; }
  .gc.gP  { background:#F0AAB422; }
  .gc.gK  { background:#14141422; }
  .gc.blocked::after {
    content:'✕'; position:absolute; inset:0;
    display:grid; place-items:center;
    color:var(--danger); font-size:.5rem; font-weight:800;
    opacity:.8; pointer-events:none; z-index:3;
  }

  .cube { position:absolute; inset:0; border-radius:3px; z-index:2; pointer-events:none; }
  .cube.cW {
    background:linear-gradient(145deg,#fff,#f0f0f0 50%,#e0e0e0);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9),inset 0 -1px 0 rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.3);
  }
  .cube.cDB {
    background:linear-gradient(145deg,#1a35a8,#14288C 50%,#0f1e6a);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.2),inset 0 -1px 0 rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.5);
  }
  .cube.cLB {
    background:linear-gradient(145deg,#3cc4f0,#28AADC 50%,#1d8ab5);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.25),inset 0 -1px 0 rgba(0,0,0,.25),0 1px 3px rgba(0,0,0,.5);
  }
  .cube.cP {
    background:linear-gradient(145deg,#f8c4cc,#F0AAB4 50%,#d8909a);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.3),inset 0 -1px 0 rgba(0,0,0,.15),0 1px 3px rgba(0,0,0,.5);
  }
  .cube.cK {
    background:linear-gradient(145deg,#2a2a2a,#141414 50%,#000);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.1),inset 0 -1px 0 rgba(0,0,0,.5),0 1px 3px rgba(0,0,0,.6);
  }
  @keyframes cubePop {
    0%{transform:scale(0);opacity:0}50%{transform:scale(1.15);opacity:1}100%{transform:scale(1);opacity:1}
  }
  .cube.pop { animation:cubePop 220ms cubic-bezier(.34,1.56,.64,1) both; }

  /* BOTTOM */
  .bottom {
    flex-shrink:0;
    padding:6px 10px 10px;
    display:flex; flex-direction:column; gap:6px;
  }

  .wz-row { display:flex; align-items:center; gap:6px; }
  .wz-label {
    font-size:.55rem; color:var(--muted); text-transform:uppercase;
    letter-spacing:.08em; font-weight:700;
    writing-mode:vertical-rl; transform:rotate(180deg);
  }
  .waiting-zone {
    position:relative; flex:1; height:50px;
    background:var(--panel); border-radius:10px;
    border:2px solid rgba(255,255,255,.06);
    overflow:hidden;
    transition:border-color 300ms;
  }
  .waiting-zone.active { border-color:var(--accent); }
  /* belt stripes */
  .waiting-zone::before {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
    background:repeating-linear-gradient(
      90deg, transparent 0, transparent 16px,
      rgba(255,255,255,.03) 16px, rgba(255,255,255,.03) 18px
    );
    animation:beltMove 1.2s linear infinite;
  }
  @keyframes beltMove { to { background-position: 18px 0; } }
  /* tunnel fade caps */
  .wz-tunnel {
    position:absolute; top:0; bottom:0; width:24px; z-index:3; pointer-events:none;
    background:linear-gradient(to right, #16171e 60%, transparent);
  }
  .wz-tunnel.r { right:0; left:auto; background:linear-gradient(to left, #16171e 60%, transparent); }
  .wz-count-badge {
    font-family:'Fredoka',sans-serif; font-size:.8rem; font-weight:700;
    color:var(--muted); min-width:28px; text-align:center;
    transition: color 200ms;
  }
  .wz-count-badge.danger { color: var(--danger); }
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:.72rem; font-style:italic; z-index:1;
  }
  /* canon card on belt */
  .wz-cannon {
    position:absolute; top:50%; transform:translateY(-50%);
    display:flex; align-items:center; gap:4px;
    padding:6px 12px; border-radius:10px; background:var(--surface);
    box-shadow:0 2px 8px rgba(0,0,0,.4);
    z-index:2; white-space:nowrap; cursor:default;
  }

.wz-cannon {
  position: absolute;
  z-index: 20; /* 🔥 au-dessus de TOUT */
}
  .wz-cannon.shooting { box-shadow:0 0 12px rgba(255,107,74,.6); }
  .wz-dot { width:24px; height:24px; border-radius:6px; flex-shrink:0; }
  .wz-dot.bW  { background:var(--col-W); }
  .wz-dot.bDB { background:var(--col-DB); }
  .wz-dot.bLB { background:var(--col-LB); }
  .wz-dot.bP  { background:var(--col-P); }
  .wz-dot.bK  { background:var(--col-K); }
  .wz-count { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:800; color:var(--text); }
  /* flying pixel animation */
  .fly-pixel {
    position: fixed;
    width: 8px; height: 8px; border-radius: 2px;
    pointer-events: none; z-index: 999;
    will-change: transform, opacity;
    animation: flyUp 0.28s ease-out forwards;
  }
  @keyframes flyUp {
    0%   { transform: translate(0, 0) scale(1); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(0.5); opacity: 0; }
  }

  .cannons-box { display:flex; flex-direction:column; gap:5px; align-items:center; }
  .cannons-row { display:flex; justify-content:center; gap:8px; flex-wrap:nowrap; }
  .cannon {
    display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:8px 12px; border-radius:10px; background:var(--surface);
    cursor:pointer; transition:all 120ms ease;
    border:2px solid transparent; box-shadow:0 3px 8px rgba(0,0,0,.3);
    user-select:none; min-width:50px;
  }
  .cannon:hover { transform:translateY(-2px); border-color:rgba(255,255,255,.15); box-shadow:0 6px 14px rgba(0,0,0,.5); }
  .cannon:active { transform:translateY(0); }
  .cannon.disabled { opacity:.3; pointer-events:none; }
  .cannon.reserve { opacity:.75; transform:scale(.9); }
  .cannon.reserve:hover { opacity:1; transform:scale(.95) translateY(-2px); }

  .cannon-slot {
    min-width:54px; min-height:64px;
    display:flex; align-items:center; justify-content:center;
    border-radius:10px;
    border:2px dashed rgba(255,255,255,.07);
  }

  .main-row   { border-bottom:1px solid rgba(255,255,255,.06); padding-bottom:6px; margin-bottom:4px; }
  .reserve-row { opacity:.85; }

  /* pas de highlight ligne courante */

  .cannon-barrel { width:26px; height:26px; border-radius:6px; position:relative; }
  .cannon-barrel.bW  { background:var(--col-W); }
  .cannon-barrel.bDB { background:var(--col-DB); }
  .cannon-barrel.bLB { background:var(--col-LB); }
  .cannon-barrel.bP  { background:var(--col-P); }
  .cannon-barrel.bK  { background:var(--col-K); }
  .cannon-barrel::after {
    content:''; position:absolute; inset:2px; border-radius:4px;
    background:linear-gradient(135deg,rgba(255,255,255,.25),transparent 60%);
  }
  .cannon-ammo { font-family:'Fredoka',sans-serif; font-size:.8rem; font-weight:700; }

  .bottom-row { display:flex; justify-content:space-between; align-items:center; }
  .status { font-size:.7rem; color:var(--muted); flex:1; }
  .status.error { color:var(--danger); }
  .status.ok { color:var(--success); }
  .level-btn {
    font-family:'Fredoka',sans-serif; font-size:.7rem; font-weight:600;
    padding:4px 10px; border-radius:8px; border:none; cursor:pointer;
    background:var(--surface); color:var(--muted);
    transition:all 120ms;
  }
  .level-btn.active { background:var(--accent); color:#fff; }
  .level-btn:hover { color:var(--text); }
  .reset-btn {
    font-size:.65rem; font-weight:600;
    padding:4px 12px; border-radius:6px; border:none;
    color:var(--muted); background:var(--surface); cursor:pointer;
  }
  .reset-btn:hover { color:var(--text); }

  .overlay {
    display:none; position:fixed; inset:0; z-index:100;
    background:rgba(0,0,0,.8); backdrop-filter:blur(8px); place-items:center;
  }
  .overlay.show { display:grid; }
  .ocard {
    background:var(--panel); border-radius:20px; padding:28px 32px;
    text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.7);
    animation:oPop 500ms cubic-bezier(.34,1.56,.64,1) both;
    max-width:300px;
  }
  @keyframes oPop { 0%{transform:scale(.6);opacity:0} 100%{transform:scale(1);opacity:1} }
  .ocard h2 { font-family:'Fredoka',sans-serif; font-size:1.6rem; margin-bottom:6px; }
  .ocard h2.go { color:var(--danger); }
  .ocard h2.win {
    background:linear-gradient(135deg,#28AADC,#F0AAB4,#ff6b4a);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .ocard p { color:var(--muted); margin-bottom:12px; font-size:.9rem; }
  .ocard button {
    font-family:'Fredoka',sans-serif; font-size:.9rem; font-weight:700;
    padding:8px 22px; border-radius:10px; border:none; color:white;
    background:linear-gradient(135deg,var(--accent),#e0452f); cursor:pointer;
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }
  .shake { animation:shake 350ms ease; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1 id="levelTitle">Pixel Cannon</h1>
    <div class="stats">
      <div>Tirs:<b id="sShots">0</b></div>
      <div><span class="hl" id="sProg">0%</span></div>
    </div>
  </div>
  <div style="display:flex;gap:6px;padding:0 14px 6px;flex-shrink:0;">
    <button class="level-btn active" id="lvl0" onclick="switchLevel(0)">🐾 Stitch</button>
    <button class="level-btn" id="lvl1" onclick="switchLevel(1)">🍜 Ramen</button>
  </div>

  <div class="grid-section">
    <div class="grid-outer" id="gridOuter">
      <div class="rail-border" id="railBorder"></div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <div class="bottom">
    <div class="wz-row">
      <div class="wz-label">File</div>
      <div class="waiting-zone" id="wZone">
        <div class="wz-tunnel l"></div>
        <div class="wz-tunnel r"></div>
      </div>
      <div class="wz-count-badge" id="beltCount">0/5</div>
    </div>
    <div class="cannons-box" id="cannonsBox"></div>
    <div class="bottom-row">
      <div class="status" id="status"></div>
      <button class="reset-btn" id="resetBtn">Reset</button>
    </div>
  </div>
</div>

<div class="overlay" id="goOverlay">
  <div class="ocard">
    <h2 class="go">Game Over !</h2>
    <p id="goMsg">Chemin bloqué !</p>
    <button onclick="resetGame()">Réessayer</button>
  </div>
</div>

<div class="overlay" id="winOverlay">
  <div class="ocard">
    <h2 class="win">Stitch est là !</h2>
    <p>En <b id="winShots">0</b> tirs</p>
    <button onclick="resetGame()">Rejouer</button>
  </div>
</div>

<script>
(() => {
  const N=20, MAX_SHOTS=10, CPR=5, VR=2;

  // ── LEVELS ──────────────────────────────────────────────────────────────
  const LEVELS = [
    {
      name: 'Stitch',
      colors: {
        W:{n:'Blanc',   b:'bW', c:'cW', hex:'#f0f0f0'},
        DB:{n:'Marine', b:'bDB',c:'cDB',hex:'#14288C'},
        LB:{n:'Bleu',   b:'bLB',c:'cLB',hex:'#28AADC'},
        P:{n:'Rose',    b:'bP', c:'cP', hex:'#F0AAB4'},
        K:{n:'Noir',    b:'bK', c:'cK', hex:'#141414'},
      },
      grid: [
        ['W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W'],
        ['W','W','W','W','P','P','W','W','DB','W','W','W','W','DB','DB','W','P','P','W','W'],
        ['W','W','W','P','P','DB','DB','W','DB','DB','W','W','DB','DB','DB','P','P','P','W','W'],
        ['W','W','W','P','DB','DB','DB','DB','DB','DB','DB','DB','DB','DB','DB','DB','P','W','W','W'],
        ['W','W','W','W','DB','DB','DB','DB','DB','DB','DB','DB','DB','DB','DB','DB','W','W','W','W'],
        ['W','W','W','W','W','DB','DB','LB','LB','LB','LB','LB','LB','DB','DB','W','W','W','W','W'],
        ['W','W','W','W','W','DB','LB','LB','LB','LB','LB','LB','LB','LB','DB','W','W','W','W','W'],
        ['W','W','W','W','DB','DB','LB','LB','K','K','LB','LB','K','K','DB','DB','W','W','W','W'],
        ['W','W','W','W','P','DB','LB','K','K','K','LB','K','K','K','DB','P','W','W','W','W'],
        ['W','W','W','W','W','DB','LB','LB','K','LB','LB','LB','K','LB','DB','W','W','W','W','W'],
        ['W','W','W','W','W','DB','DB','LB','LB','LB','LB','LB','LB','DB','DB','W','W','W','W','W'],
        ['W','W','W','W','W','W','DB','DB','LB','DB','DB','LB','DB','DB','W','W','W','W','W','W'],
        ['W','W','W','W','W','DB','DB','DB','DB','DB','DB','DB','DB','DB','DB','W','W','W','W','W'],
        ['W','W','W','W','W','W','DB','DB','DB','DB','DB','DB','DB','DB','W','W','W','W','W','W'],
        ['W','W','W','W','W','W','W','W','DB','DB','DB','DB','W','W','W','W','W','W','W','W'],
        ['W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W'],
        ['W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W'],
        ['W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W'],
        ['W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W'],
        ['W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W'],
      ]
    },
    {
      name: 'Ramen',
      colors: {
        W:{n:'Blanc',      b:'bW', c:'cW', hex:'#f0f0f0'},
        K:{n:'Noir',       b:'bK', c:'cK', hex:'#141414'},
        LB:{n:'Bleu clair',b:'bLB',c:'cLB',hex:'#87CEEB'},
        VL:{n:'Bleu pâle', b:'bVL',c:'cVL',hex:'#B8E8F5'},
        P:{n:'Rose',       b:'bP', c:'cP', hex:'#F0AAB4'},
        GR:{n:'Vert',      b:'bGR',c:'cGR',hex:'#2D5A27'},
        YE:{n:'Jaune',     b:'bYE',c:'cYE',hex:'#F5D060'},
        BR:{n:'Marron',    b:'bBR',c:'cBR',hex:'#8B4513'},
      },
      grid: [
        ['W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W'],
        ['W','W','W','W','W','K','K','W','W','W','W','W','W','K','K','K','W','W','W','W'],
        ['W','W','W','W','W','K','GR','K','W','W','W','W','K','BR','BR','K','W','W','W','W'],
        ['W','W','W','W','W','K','GR','GR','K','W','W','K','BR','W','BR','K','W','W','W','W'],
        ['W','W','W','W','K','GR','GR','GR','K','K','YE','YE','YE','YE','K','K','W','W','W','W'],
        ['W','W','W','K','GR','GR','GR','K','K','YE','YE','YE','YE','YE','K','W','W','W','W','W'],
        ['W','W','W','K','GR','GR','K','K','YE','YE','YE','YE','YE','YE','K','K','W','W','W','W'],
        ['W','W','W','K','K','K','K','YE','YE','YE','YE','YE','YE','K','K','P','W','W','W','W'],
        ['W','W','W','K','YE','YE','YE','YE','YE','YE','YE','YE','K','P','K','K','W','W','W','W'],
        ['W','K','K','K','YE','YE','YE','YE','YE','YE','YE','K','P','P','K','W','W','W','W','W'],
        ['W','K','K','K','K','K','K','K','K','K','K','K','K','K','K','K','K','K','W','W'],
        ['W','K','LB','LB','LB','LB','LB','LB','LB','LB','LB','LB','LB','LB','LB','LB','K','K','W','W'],
        ['W','K','LB','VL','VL','VL','VL','VL','VL','VL','VL','VL','VL','LB','LB','K','W','W','W','W'],
        ['W','K','LB','VL','K','K','K','VL','VL','VL','VL','K','K','K','VL','LB','K','W','W','W'],
        ['W','K','LB','VL','VL','VL','VL','VL','VL','VL','VL','VL','VL','VL','VL','LB','K','W','W','W'],
        ['W','K','LB','VL','P','P','VL','VL','K','VL','VL','P','P','VL','VL','LB','K','W','W','W'],
        ['W','K','LB','VL','VL','VL','VL','K','K','K','K','VL','VL','VL','LB','K','W','W','W','W'],
        ['W','W','K','LB','LB','LB','LB','LB','LB','LB','LB','LB','LB','LB','LB','K','W','W','W','W'],
        ['W','W','W','K','LB','LB','LB','LB','LB','LB','LB','LB','LB','LB','K','W','W','W','W','W'],
        ['W','W','W','W','K','K','K','K','K','K','K','K','K','W','W','W','W','W','W','W'],
      ]
    }
  ];

  let currentLevel = 0;
  let T, CI, CK, GC;

  function loadLevel(idx) {
    currentLevel = idx;
    const lv = LEVELS[idx];
    T  = lv.grid;
    CI = lv.colors;
    CK = Object.keys(CI);

    // Build GC (grid cell class map) and inject CSS vars for colors
    GC = {};
    for (const key of CK) {
      GC[key] = 'g' + key;
    }
    injectColorCSS(CI);
  }

  function injectColorCSS(colors) {
    let existing = document.getElementById('dynamic-colors');
    if (!existing) {
      existing = document.createElement('style');
      existing.id = 'dynamic-colors';
      document.head.appendChild(existing);
    }
    let css = '';
    for (const [key, def] of Object.entries(colors)) {
      const hex = def.hex;
      css += `
        .g${key}   { background: ${hex}22; }
        .b${key}   { background: ${hex}; }
        .c${key}   { background: linear-gradient(145deg, ${lighten(hex)}, ${hex} 50%, ${darken(hex)}); box-shadow: inset 0 1px 0 rgba(255,255,255,.25), inset 0 -1px 0 rgba(0,0,0,.2), 0 1px 3px rgba(0,0,0,.5); }
        :root      { --col-${key}: ${hex}; }
      `;
    }
    existing.textContent = css;
  }

  function lighten(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.min(255,r+40)},${Math.min(255,g+40)},${Math.min(255,b+40)})`;
  }
  function darken(hex) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.max(0,r-30)},${Math.max(0,g-30)},${Math.max(0,b-30)})`;
  }
  // ── END LEVELS ───────────────────────────────────────────────────────────

  // Accessibility from 4 edges
  function canFromBot(r,c){for(let i=N-1;i>r;i--)if(placed[i][c])return false;return true;}
  function canFromTop(r,c){for(let i=0;i<r;i++)if(placed[i][c])return false;return true;}
  function canFromLeft(r,c){for(let i=0;i<c;i++)if(placed[r][i])return false;return true;}
  function canFromRight(r,c){for(let i=N-1;i>c;i--)if(placed[r][i])return false;return true;}
  function isOK(r,c){return canFromBot(r,c)||canFromTop(r,c)||canFromLeft(r,c)||canFromRight(r,c);}
  function findBlocked(){
    for(let r=0;r<N;r++)for(let c=0;c<N;c++)
      if(!placed[r][c]&&!isOK(r,c))return{r,c};
    return null;
  }

  function buildFirePlan(color){
    const plan=[];
    for(let r=0;r<N;r++)for(let c=0;c<N;c++)
      if(T[r][c]===color&&!placed[r][c])plan.push({r,c});
    return plan;
  }

  function buildCannons(){
    const tot = {};
    for (const k of CK) tot[k] = 0;
    for(let r=0;r<N;r++)for(let c=0;c<N;c++) if(tot[T[r][c]]!==undefined) tot[T[r][c]]++;
    const arr=[];let id=0;
    for(const k of CK){
      const t=tot[k];if(t<=0)continue;
      const f=Math.floor(t/MAX_SHOTS),d=t%MAX_SHOTS;
      for(let i=0;i<f;i++)arr.push({id:id++,color:k,max:MAX_SHOTS,rem:MAX_SHOTS,inZone:false,done:false,firing:false});
      if(d>0)arr.push({id:id++,color:k,max:d,rem:d,inZone:false,done:false,firing:false});
    }
    const piles={};
    for(const cn of arr){if(!piles[cn.color])piles[cn.color]=[];piles[cn.color].push(cn);}
    for(const k of CK)if(piles[k])shuf(piles[k]);
    const res=[];let s=arr.length+10;
    while(res.length<arr.length&&s-->0)for(const k of CK)if(piles[k]&&piles[k].length)res.push(piles[k].shift());
    return res;
  }
  function shuf(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}}

  // ── STATE ───────────────────────────────────────────────────────────────
  // ── STATE ────────────────────────────────────────────────────────────────
  let placed, shots, gameOver;
  let currentRow = 0;       // ligne courante du pixel art
  let mainLine   = [];      // 5 slots max — canons actifs (ligne principale)
  let reserveLine = [];     // 5 slots max — réserve visible
  let hiddenPile  = [];     // pile cachée, alimente la réserve automatiquement
  let beltCannons = [];     // canons sur le tapis (max 5)

  const MAX_BELT = 5;
  const SLOTS    = 5;

  const $ = id => document.getElementById(id);
  const gridEl = $('grid'), wZ = $('wZone'),
        sS = $('sShots'), sP = $('sProg'),
        wO = $('winOverlay'), wS = $('winShots'),
        gOv = $('goOverlay'), gM = $('goMsg'),
        rB = $('railBorder'), stEl = $('status');

  // ── BELT ─────────────────────────────────────────────────────────────────
  const BELT_SPEED    = 100;
  const CARD_W        = 64;
  const FIRE_COOLDOWN = 120;

  let beltStateMap = new Map(); // id -> { x, lastFired, el }
  let firePlanMap  = new Map(); // id -> [{r,c}]
  let beltRAF = null, beltLast = null, cachedTrackW = 300;

  const ro = new ResizeObserver(e => { for (const x of e) cachedTrackW = x.contentRect.width; });

  // ── HELPERS ───────────────────────────────────────────────────────────────

  // Pixels non-blancs de la ligne r
  function rowPixels(r) {
    const out = [];
    for (let c = 0; c < N; c++)
      if (T[r][c] !== 'W') out.push({r, c, color: T[r][c]});
    return out;
  }

  // Trouver la première ligne non-entièrement-blanche
  function firstNonWhiteRow(startR) {
    for (let r = startR; r < N; r++)
      if (rowPixels(r).length > 0) return r;
    return -1; // fin du dessin
  }

  // Vérifier si la ligne r est complètement placée (hors blancs)
  function isRowComplete(r) {
    return rowPixels(r).every(p => placed[p.r][p.c]);
  }

  // Construire un canon {id, color, rem}
  let _nextId = 0;
  function makeCannon(color, rem) {
    return { id: _nextId++, color, rem, inZone: false, done: false };
  }

  // Construire tous les canons pour le pixel art (en ignorant blanc)
  // Retourne tableau plat trié par couleur / 10 tirs max
  // Construit la pile ordonnée de canons en suivant le dessin ligne par ligne.
  // Pour chaque ligne on regarde quelles couleurs sont nécessaires.
  // On crée des canons au fur et à mesure des besoins, en réutilisant un canon
  // existant s'il a encore des munitions, ou en en créant un nouveau sinon.
  // Résultat : une pile où les canons arrivent dans l'ordre d'utilité,
  // avec de la variété (couleurs mélangées selon les lignes) et une tension
  // naturelle (parfois tu as besoin d'un canon qui n'est pas encore en ligne principale).
  function buildOrderedPile() {
    // Stock de canons disponibles par couleur (non encore assignés à la pile)
    const stock = {}; // color -> [cannon, ...]
    for (const k of CK) {
      if (k === 'W') continue;
      stock[k] = [];
      // Compter les pixels de cette couleur dans tout le dessin
      let tot = 0;
      for (let r = 0; r < N; r++)
        for (let c = 0; c < N; c++)
          if (T[r][c] === k) tot++;
      if (!tot) continue;
      const full = Math.floor(tot / MAX_SHOTS);
      const rest = tot % MAX_SHOTS;
      for (let i = 0; i < full; i++) stock[k].push(makeCannon(k, MAX_SHOTS));
      if (rest > 0) stock[k].push(makeCannon(k, rest));
    }

    // Parcourir les lignes du dessin et construire la pile dans l'ordre d'utilité
    // Pour chaque ligne, on ajoute UN canon de chaque couleur présente sur cette ligne
    // (si ce canon n'est pas déjà dans la pile pour cette couleur)
    const pile = [];
    const inPile = new Set(); // ids des canons déjà dans la pile

    for (let r = 0; r < N; r++) {
      // Couleurs uniques présentes sur cette ligne (hors blanc)
      const rowColors = [...new Set(
        Array.from({length: N}, (_, c) => T[r][c]).filter(col => col !== 'W')
      )];
      if (!rowColors.length) continue;

      // Pour chaque couleur de la ligne, ajouter le prochain canon dispo
      for (const col of rowColors) {
        if (!stock[col] || !stock[col].length) continue;
        // Chercher si on a déjà un canon de cette couleur dans la pile
        // qui a encore des munitions pour cette ligne — si oui, pas besoin d'en ajouter un autre maintenant
        const alreadyInPile = pile.find(cn => cn.color === col && !inPile.has('_used_' + cn.id));
        if (alreadyInPile) {
          // Marquer qu'il couvre cette ligne
          inPile.add('_used_' + alreadyInPile.id);
          // Si ce canon est épuisé après cette ligne, ajouter le suivant pour plus tard
          // (on vérifiera ça au prochain passage)
        } else {
          // Ajouter un nouveau canon de cette couleur
          const cn = stock[col].shift();
          pile.push(cn);
          inPile.add('_used_' + cn.id);
        }
      }
    }

    // Ajouter les canons restants du stock à la fin (canons supplémentaires)
    for (const k of CK) {
      if (!stock[k]) continue;
      for (const cn of stock[k]) pile.push(cn);
    }

    return pile;
  }

  // Remplir les lignes principale et réserve depuis la pile cachée
  function refillLines() {
    // réserve d'abord : slots libres = SLOTS - occupés
    while (reserveLine.length < SLOTS && hiddenPile.length > 0)
      reserveLine.push(hiddenPile.shift());
    // principale ensuite (seulement si vide au reset)
    while (mainLine.length < SLOTS && reserveLine.length > 0) {
      // Ne rempli la ligne principale automatiquement qu'au reset
      // En jeu, c'est le joueur qui choisit
    }
  }

  // Remplir la réserve automatiquement
  function autoFillReserve() {
    while (reserveLine.length < SLOTS && hiddenPile.length > 0)
      reserveLine.push(hiddenPile.shift());
    renderCannonLines();
  }

  // Plan de tir d'un canon pour la ligne courante (et futures)
  function makePlanForRow(cn, r) {
    const plan = [];
    for (let c = 0; c < N; c++)
      if (T[r][c] === cn.color && !placed[r][c]) plan.push({r, c});
    return plan;
  }

  // Tous les pixels non placés de la couleur du canon sur les lignes restantes
  function makePlanAll(cn) {
    const plan = [];
    if (cn.color === 'W') return plan;
    for (let r = currentRow; r < N; r++)
      for (let c = 0; c < N; c++)
        if (T[r][c] === cn.color && !placed[r][c]) plan.push({r, c});
    return plan;
  }

  // ── BELT LOGIC ────────────────────────────────────────────────────────────

  function sendToBelt(cn) {
    if (gameOver) return;
    if (beltCannons.length >= MAX_BELT) {
      trigGameOver('Trop de canons sur le tapis !');
      return;
    }
    cn.inZone = true;
    beltCannons.push(cn);

    // Plan : pixels de la couleur du canon depuis la ligne courante
    firePlanMap.set(cn.id, makePlanAll(cn));

    // Créer carte tapis
    const el = document.createElement('div');
    el.dataset.id = cn.id;
    el.className = 'wz-cannon';
    el.innerHTML = `<div class="wz-dot ${CI[cn.color].b}"></div><div class="wz-count">${cn.rem}</div>`;
    wZ.appendChild(el);
    const emp = wZ.querySelector('.wz-empty');
    if (emp) emp.remove();
    wZ.classList.add('active');

    beltStateMap.set(cn.id, { x: -CARD_W, lastFired: -Infinity, el });
    startBelt();
    updateBeltCount();
    renderCannonLines();
  }

  function removeFromBelt(cn) {
    cn.inZone = false; cn.done = true;
    const idx = beltCannons.indexOf(cn);
    if (idx !== -1) beltCannons.splice(idx, 1);
    const el = wZ.querySelector(`[data-id="${cn.id}"]`);
    if (el) el.remove();
    beltStateMap.delete(cn.id);
    firePlanMap.delete(cn.id);
    if (!beltCannons.length) showEmptyBelt();
    updateBeltCount();
    renderCannonLines();
  }

  function updateBeltCount() {
    const badge = document.getElementById('beltCount');
    if (!badge) return;
    const n = beltCannons.length;
    badge.textContent = n + '/5';
    badge.classList.toggle('danger', n >= 4);
  }

  function showEmptyBelt() {
    for (const el of [...wZ.querySelectorAll('.wz-cannon')]) el.remove();
    if (!wZ.querySelector('.wz-empty')) {
      const s = document.createElement('span');
      s.className = 'wz-empty'; s.textContent = 'Clique un canon';
      wZ.appendChild(s);
    }
    wZ.classList.remove('active');
  }

  function startBelt() {
    if (beltRAF) return;
    beltLast = null;
    function tick(ts) {
      if (!beltLast) beltLast = ts;
      const dt = Math.min((ts - beltLast) / 1000, 0.05);
      beltLast = ts;
      if (!beltCannons.length) { beltRAF = null; showEmptyBelt(); return; }
      const trackW = cachedTrackW || 300;

      for (const cn of [...beltCannons]) {
        const st = beltStateMap.get(cn.id);
        if (!st) continue;
        st.x += BELT_SPEED * dt;
        if (st.x > trackW) st.x = -CARD_W;
        if (st.el) st.el.style.left = st.x + 'px';

        if (st.x < 0 || st.x + CARD_W > trackW) continue;

        const plan = firePlanMap.get(cn.id);
        if (!plan) continue;

        // Nettoyer les pixels déjà placés
        while (plan.length && placed[plan[0].r][plan[0].c]) plan.shift();

        // Ne tirer que sur la ligne courante
        while (plan.length && plan[0].r < currentRow) plan.shift();

        if (!plan.length) {
          // Plus rien à tirer pour ce canon
          removeFromBelt(cn);
          continue;
        }

        // Ne tirer que si la cellule est sur la ligne courante
        if (plan[0].r !== currentRow) continue;

        if (ts - st.lastFired < FIRE_COOLDOWN) continue;

        const {r, c} = plan.shift();
        st.lastFired = ts;
        firePixel(cn, r, c);
      }
      beltRAF = requestAnimationFrame(tick);
    }
    beltRAF = requestAnimationFrame(tick);
  }

  function stopBelt() {
    if (beltRAF) { cancelAnimationFrame(beltRAF); beltRAF = null; }
  }

  // ── FIRE ──────────────────────────────────────────────────────────────────

  function firePixel(cn, r, c) {
    cn.rem--;
    shots++;
    const cardEl = wZ.querySelector(`[data-id="${cn.id}"]`);
    if (cardEl) cardEl.querySelector('.wz-count').textContent = cn.rem;
    if (cn.rem <= 0) cn.done = true;

    // Animation
    const cannonEl = wZ.querySelector(`[data-id="${cn.id}"]`);
    const cellEl   = gridEl.children[r * N + c];
    if (cannonEl && cellEl) {
      const cr = cannonEl.getBoundingClientRect();
      const gr = cellEl.getBoundingClientRect();
      const startX = cr.left + cr.width / 2 - 4;
      const startY = cr.top  + cr.height / 2 - 4;
      const dx = (gr.left + gr.width / 2 - 4) - startX;
      const dy = (gr.top  + gr.height / 2 - 4) - startY;
      const px = document.createElement('div');
      px.className = 'fly-pixel';
      px.style.cssText = `left:${startX}px;top:${startY}px;background:var(--col-${cn.color});--dx:${dx}px;--dy:${dy}px;`;
      document.body.appendChild(px);
      setTimeout(() => px.remove(), 300);
    }

    placed[r][c] = true;
    placeCell(r, c);
    updStats();
    playPop();

    // Canon vide → retirer du tapis
    if (cn.done) {
      setTimeout(() => removeFromBelt(cn), 50);
    }

    // Vérifier si la ligne courante est complète
    if (isRowComplete(currentRow)) {
      advanceRow();
    }

    // Vérifier victoire
    const {d, t} = prog();
    if (d === t) {
      setTimeout(() => { wS.textContent = shots; wO.classList.add('show'); }, 400);
    }
  }

  function advanceRow() {
    // Chercher la prochaine ligne non-blanche non-complète
    let next = firstNonWhiteRow(currentRow + 1);
    if (next === -1) return; // toutes les lignes sont finies
    currentRow = next;
    setSt(`Ligne ${currentRow + 1}`, 'ok');
    highlightRow(currentRow);

    // Mettre à jour les plans des canons sur le tapis
    for (const cn of beltCannons) {
      const plan = firePlanMap.get(cn.id);
      if (!plan) continue;
      // Ajouter les pixels de la nouvelle ligne
      for (let c = 0; c < N; c++)
        if (T[currentRow][c] === cn.color && !placed[currentRow][c])
          if (!plan.find(p => p.r === currentRow && p.c === c))
            plan.push({r: currentRow, c});
    }
  }

  function highlightRow(r) {
    // Mettre en évidence la ligne courante dans la grille
    for (let row = 0; row < N; row++) {
      for (let c = 0; c < N; c++) {
        const el = gridEl.children[row * N + c];
        if (el) el.classList.toggle('current-row', row === r);
      }
    }
  }

  // ── GAME OVER ─────────────────────────────────────────────────────────────

  function trigGameOver(msg) {
    gameOver = true;
    gM.textContent = msg;
    gOv.classList.add('show');
    renderCannonLines();
  }

  // ── RENDER ────────────────────────────────────────────────────────────────

  function prog() {
    let d = 0;
    for (let r = 0; r < N; r++)
      for (let c = 0; c < N; c++)
        if (placed[r][c]) d++;
    // total = pixels non-blancs
    let t = 0;
    for (let r = 0; r < N; r++)
      for (let c = 0; c < N; c++)
        if (T[r][c] !== 'W') t++;
    return {d, t};
  }

  function updStats() {
    sS.textContent = shots;
    const {d, t} = prog();
    sP.textContent = Math.round(d / t * 100) + '%';
  }

  function setSt(m, tp = '') { stEl.textContent = m; stEl.className = 'status ' + tp; }

  function placeCell(r, c) {
    const idx = r * N + c;
    const cell = gridEl.children[idx];
    if (!cell || cell.querySelector('.cube')) return;
    const cb = document.createElement('div');
    cb.className = 'cube ' + CI[T[r][c]].c + ' pop';
    cell.appendChild(cb);
  }

  function renderGrid() {
    gridEl.innerHTML = '';
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
      const cell = document.createElement('div');
      cell.className = 'gc ' + GC[T[r][c]];
      cell.style.position = 'relative';
      if (placed[r][c]) {
        const cb = document.createElement('div');
        cb.className = 'cube ' + CI[T[r][c]].c;
        cell.appendChild(cb);
      }
      gridEl.appendChild(cell);
    }
  }

  // Rendu des 2 lignes de canons + réserve
  function renderCannonLines() {
    const cBox = $('cannonsBox');
    cBox.innerHTML = '';
    if (gameOver) {
      cBox.innerHTML = '<div style="color:var(--danger);font-size:.75rem;font-weight:600">Game Over</div>';
      return;
    }

    // Ligne principale
    const mainRow = document.createElement('div');
    mainRow.className = 'cannons-row main-row';
    for (let i = 0; i < SLOTS; i++) {
      const slot = document.createElement('div');
      slot.className = 'cannon-slot';
      const cn = mainLine[i];
      if (cn && !cn.done) {
        const el = document.createElement('div');
        el.className = 'cannon';
        el.innerHTML = `<div class="cannon-barrel ${CI[cn.color].b}"></div><div class="cannon-ammo">${cn.rem}</div>`;
        el.addEventListener('click', () => onMainClick(cn, i));
        slot.appendChild(el);
      }
      mainRow.appendChild(slot);
    }
    cBox.appendChild(mainRow);

    // Ligne réserve
    const resRow = document.createElement('div');
    resRow.className = 'cannons-row reserve-row';
    for (let i = 0; i < SLOTS; i++) {
      const slot = document.createElement('div');
      slot.className = 'cannon-slot';
      const cn = reserveLine[i];
      if (cn && !cn.done) {
        const el = document.createElement('div');
        el.className = 'cannon reserve';
        el.innerHTML = `<div class="cannon-barrel ${CI[cn.color].b}"></div><div class="cannon-ammo">${cn.rem}</div>`;

        // Clic sur réserve : monter vers un slot vide de la ligne principale
        el.addEventListener('click', () => onReserveClick(cn, i));
        slot.appendChild(el);
      }
      resRow.appendChild(slot);
    }
    cBox.appendChild(resRow);
  }

  // Clic ligne principale → envoyer sur le tapis
 function onMainClick(cn, slotIdx) {
  if (gameOver || cn.inZone) return;

  if (beltCannons.length >= MAX_BELT) {
    trigGameOver('5 canons sur le tapis — Game Over !');
    return;
  }

  // envoyer sur le tapis
  sendToBelt(cn);

  // 🔥 CASCADE automatique
  if (reserveLine.length > 0) {
    mainLine[slotIdx] = reserveLine[slotIdx] || reserveLine[0];
reserveLine.splice(slotIdx, 1);
  } else {
    mainLine[slotIdx] = null;
  }

  // remplir la réserve depuis la pile cachée
  autoFillReserve();

  renderCannonLines();
}

  // Clic réserve → monter vers le premier slot vide de la ligne principale
  function onReserveClick(cn, resIdx) {
    if (gameOver) return;
    // Chercher un slot vide dans la ligne principale
    const emptySlot = mainLine.findIndex(s => !s || s.done);
    if (emptySlot === -1) return; // pas de slot libre
    mainLine[emptySlot] = cn;
    reserveLine.splice(resIdx, 1);
    autoFillReserve();
    renderCannonLines();
  }

  // ── AUDIO ─────────────────────────────────────────────────────────────────
  let popAudio = null;
  function playPop() {
    try {
      if (!popAudio) { popAudio = new Audio(popSnd); popAudio.volume = 0.4; }
      const clone = popAudio.cloneNode();
      clone.volume = 0.4;
      clone.play().catch(() => {});
    } catch(e) {}
  }

  // ── SWITCH / RESET ────────────────────────────────────────────────────────
  window.switchLevel = function(idx) {
    document.querySelectorAll('.level-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
    resetGame(idx);
  };

  window.resetGame = function(idx) {
    stopBelt();
    if (idx !== undefined) loadLevel(idx);
    ro.observe(wZ);
    cachedTrackW = wZ.getBoundingClientRect().width || 300;

    // Reset state
    placed      = Array.from({length: N}, () => Array(N).fill(false));
    shots       = 0;
    gameOver    = false;
    _nextId     = 0;
    beltCannons = [];
    beltStateMap = new Map();
    firePlanMap  = new Map();
    for (const el of [...wZ.querySelectorAll('.wz-cannon')]) el.remove();

    // Trouver la première ligne non-blanche
    currentRow = firstNonWhiteRow(0);

    // Construire la pile ordonnée par utilité ligne par ligne
    const pile = buildOrderedPile();

    // Ligne principale = les 5 premiers canons de la pile (variés, utiles dès maintenant)
    mainLine    = pile.splice(0, SLOTS).concat(Array(SLOTS).fill(null)).slice(0, SLOTS);
    // Réserve = les 5 suivants
    reserveLine = pile.splice(0, SLOTS).concat(Array(SLOTS).fill(null)).slice(0, SLOTS);
    // Le reste dans la pile cachée
    hiddenPile  = pile;

    wO.classList.remove('show');
    gOv.classList.remove('show');
    rB.classList.remove('active');
    setSt(`Ligne ${currentRow + 1}`, 'ok');

    renderGrid();
    renderCannonLines();
    updStats();
    showEmptyBelt();
    document.getElementById('levelTitle').textContent = '🎮 ' + LEVELS[currentLevel].name;
  };

  $('resetBtn').addEventListener('click', () => resetGame());
  loadLevel(0);
  resetGame(0);
})();
</script>
