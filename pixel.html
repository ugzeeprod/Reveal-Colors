<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<title>Pixel Cannon — Stitch</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Outfit:wght@400;600;800&display=swap');

  :root {
    --cell: min(3.2vw, 22px);
    --gap: 1px;
    --bg: #0d0e13;
    --panel: #16171e;
    --surface: #1e1f28;
    --text: #eaeaf2;
    --muted: #7a7e8f;
    --accent: #ff6b4a;
    --success: #4ade80;
    --danger: #f87171;
    --col-W: #f0f0f0;
    --col-DB: #14288C;
    --col-LB: #28AADC;
    --col-P: #F0AAB4;
    --col-K: #141414;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: 'Outfit', sans-serif;
    overflow: hidden; height:100vh; height:100dvh;
  }

  .app {
    display:flex; flex-direction:column;
    height:100vh; height:100dvh;
    max-width:520px; margin:0 auto;
  }

  .header {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 14px; flex-shrink:0;
  }
  .header h1 {
    font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:700;
    background:linear-gradient(135deg,#28AADC,#F0AAB4,#ff6b4a);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .stats { display:flex; gap:12px; font-size:.75rem; color:var(--muted); }
  .stats b { color:var(--text); }
  .stats .hl { color:var(--success); font-weight:700; }

  .grid-section {
    flex:1 1 auto;
    display:flex; align-items:center; justify-content:center;
    padding:2px 8px; min-height:0; overflow:hidden;
  }

  .grid-outer {
    position:relative;
    background:var(--panel); border-radius:14px; padding:14px;
    box-shadow:0 6px 24px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.04);
  }
  .rail-border {
    position:absolute; inset:4px;
    border:3px solid #2a2c38;
    border-radius:11px; pointer-events:none; z-index:5;
    transition:border-color 300ms;
  }
  .rail-border.active { border-color:var(--accent); }

  .grid {
    display:grid;
    grid-template-columns:repeat(20,var(--cell));
    grid-auto-rows:var(--cell);
    gap:var(--gap); position:relative; z-index:1;
  }

  .gc { border-radius:2px; position:relative; background:#2a2b33; }
  .gc.gW  { background:#3a3b44; }
  .gc.gDB { background:#14288C22; }
  .gc.gLB { background:#28AADC22; }
  .gc.gP  { background:#F0AAB422; }
  .gc.gK  { background:#14141422; }
  .gc.blocked::after {
    content:'✕'; position:absolute; inset:0;
    display:grid; place-items:center;
    color:var(--danger); font-size:.5rem; font-weight:800;
    opacity:.8; pointer-events:none; z-index:3;
  }

  .cube { position:absolute; inset:0; border-radius:3px; z-index:2; pointer-events:none; }
  .cube.cW {
    background:linear-gradient(145deg,#fff,#f0f0f0 50%,#e0e0e0);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.9),inset 0 -1px 0 rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.3);
  }
  .cube.cDB {
    background:linear-gradient(145deg,#1a35a8,#14288C 50%,#0f1e6a);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.2),inset 0 -1px 0 rgba(0,0,0,.3),0 1px 3px rgba(0,0,0,.5);
  }
  .cube.cLB {
    background:linear-gradient(145deg,#3cc4f0,#28AADC 50%,#1d8ab5);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.25),inset 0 -1px 0 rgba(0,0,0,.25),0 1px 3px rgba(0,0,0,.5);
  }
  .cube.cP {
    background:linear-gradient(145deg,#f8c4cc,#F0AAB4 50%,#d8909a);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.3),inset 0 -1px 0 rgba(0,0,0,.15),0 1px 3px rgba(0,0,0,.5);
  }
  .cube.cK {
    background:linear-gradient(145deg,#2a2a2a,#141414 50%,#000);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.1),inset 0 -1px 0 rgba(0,0,0,.5),0 1px 3px rgba(0,0,0,.6);
  }
  @keyframes cubePop {
    0%{transform:scale(0);opacity:0}50%{transform:scale(1.15);opacity:1}100%{transform:scale(1);opacity:1}
  }
  .cube.pop { animation:cubePop 220ms cubic-bezier(.34,1.56,.64,1) both; }

  /* BOTTOM */
  .bottom {
    flex-shrink:0;
    padding:6px 10px 10px;
    display:flex; flex-direction:column; gap:6px;
  }

  .wz-row { display:flex; align-items:center; gap:6px; }
  .wz-label {
    font-size:.55rem; color:var(--muted); text-transform:uppercase;
    letter-spacing:.08em; font-weight:700;
    writing-mode:vertical-rl; transform:rotate(180deg);
  }
  .waiting-zone {
    position:relative; flex:1; height:50px;
    background:var(--panel); border-radius:10px;
    border:2px solid rgba(255,255,255,.06);
    overflow:hidden;
    transition:border-color 300ms;
  }
  .waiting-zone.active { border-color:var(--accent); }
  /* belt stripes */
  .waiting-zone::before {
    content:''; position:absolute; inset:0; pointer-events:none; z-index:0;
    background:repeating-linear-gradient(
      90deg, transparent 0, transparent 16px,
      rgba(255,255,255,.03) 16px, rgba(255,255,255,.03) 18px
    );
    animation:beltMove 1.2s linear infinite;
  }
  @keyframes beltMove { to { background-position: 18px 0; } }
  /* tunnel fade caps */
  .wz-tunnel {
    position:absolute; top:0; bottom:0; width:24px; z-index:3; pointer-events:none;
    background:linear-gradient(to right, #16171e 60%, transparent);
  }
  .wz-tunnel.r { right:0; left:auto; background:linear-gradient(to left, #16171e 60%, transparent); }
  .wz-empty {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    color:var(--muted); font-size:.72rem; font-style:italic; z-index:1;
  }
  /* canon card on belt */
  .wz-cannon {
    position:absolute; top:50%; transform:translateY(-50%);
    display:flex; align-items:center; gap:4px;
    padding:4px 8px; border-radius:8px; background:var(--surface);
    box-shadow:0 2px 8px rgba(0,0,0,.4);
    z-index:2; white-space:nowrap; cursor:default;
  }
  .wz-cannon.shooting { box-shadow:0 0 12px rgba(255,107,74,.6); }
  .wz-dot { width:14px; height:14px; border-radius:4px; flex-shrink:0; }
  .wz-dot.bW  { background:var(--col-W); }
  .wz-dot.bDB { background:var(--col-DB); }
  .wz-dot.bLB { background:var(--col-LB); }
  .wz-dot.bP  { background:var(--col-P); }
  .wz-dot.bK  { background:var(--col-K); }
  .wz-count { font-family:'Fredoka',sans-serif; font-size:.65rem; font-weight:700; color:var(--text); }
  /* flying pixel animation */
  .fly-pixel {
    position:fixed; width:10px; height:10px; border-radius:3px;
    pointer-events:none; z-index:999;
    transition: left 0.25s ease-in, top 0.25s ease-in, opacity 0.25s ease-in;
  }

  .cannons-box { display:flex; flex-direction:column; gap:5px; align-items:center; }
  .cannons-row { display:flex; justify-content:center; gap:8px; flex-wrap:nowrap; }
  .cannon {
    display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:8px 12px; border-radius:10px; background:var(--surface);
    cursor:pointer; transition:all 120ms ease;
    border:2px solid transparent; box-shadow:0 3px 8px rgba(0,0,0,.3);
    user-select:none; min-width:50px;
  }
  .cannon:hover { transform:translateY(-2px); border-color:rgba(255,255,255,.15); box-shadow:0 6px 14px rgba(0,0,0,.5); }
  .cannon:active { transform:translateY(0); }
  .cannon.disabled { opacity:.3; pointer-events:none; }

  .cannon-barrel { width:26px; height:26px; border-radius:6px; position:relative; }
  .cannon-barrel.bW  { background:var(--col-W); }
  .cannon-barrel.bDB { background:var(--col-DB); }
  .cannon-barrel.bLB { background:var(--col-LB); }
  .cannon-barrel.bP  { background:var(--col-P); }
  .cannon-barrel.bK  { background:var(--col-K); }
  .cannon-barrel::after {
    content:''; position:absolute; inset:2px; border-radius:4px;
    background:linear-gradient(135deg,rgba(255,255,255,.25),transparent 60%);
  }
  .cannon-ammo { font-family:'Fredoka',sans-serif; font-size:.8rem; font-weight:700; }

  .bottom-row { display:flex; justify-content:space-between; align-items:center; }
  .status { font-size:.7rem; color:var(--muted); flex:1; }
  .status.error { color:var(--danger); }
  .status.ok { color:var(--success); }
  .reset-btn {
    font-size:.65rem; font-weight:600;
    padding:4px 12px; border-radius:6px; border:none;
    color:var(--muted); background:var(--surface); cursor:pointer;
  }
  .reset-btn:hover { color:var(--text); }

  .overlay {
    display:none; position:fixed; inset:0; z-index:100;
    background:rgba(0,0,0,.8); backdrop-filter:blur(8px); place-items:center;
  }
  .overlay.show { display:grid; }
  .ocard {
    background:var(--panel); border-radius:20px; padding:28px 32px;
    text-align:center; box-shadow:0 20px 60px rgba(0,0,0,.7);
    animation:oPop 500ms cubic-bezier(.34,1.56,.64,1) both;
    max-width:300px;
  }
  @keyframes oPop { 0%{transform:scale(.6);opacity:0} 100%{transform:scale(1);opacity:1} }
  .ocard h2 { font-family:'Fredoka',sans-serif; font-size:1.6rem; margin-bottom:6px; }
  .ocard h2.go { color:var(--danger); }
  .ocard h2.win {
    background:linear-gradient(135deg,#28AADC,#F0AAB4,#ff6b4a);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  .ocard p { color:var(--muted); margin-bottom:12px; font-size:.9rem; }
  .ocard button {
    font-family:'Fredoka',sans-serif; font-size:.9rem; font-weight:700;
    padding:8px 22px; border-radius:10px; border:none; color:white;
    background:linear-gradient(135deg,var(--accent),#e0452f); cursor:pointer;
  }

  @keyframes shake {
    0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)}
  }
  .shake { animation:shake 350ms ease; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <h1>Pixel Cannon</h1>
    <div class="stats">
      <div>Tirs:<b id="sShots">0</b></div>
      <div><span class="hl" id="sProg">0%</span></div>
    </div>
  </div>

  <div class="grid-section">
    <div class="grid-outer" id="gridOuter">
      <div class="rail-border" id="railBorder"></div>
      <div class="grid" id="grid"></div>
    </div>
  </div>

  <div class="bottom">
    <div class="wz-row">
      <div class="wz-label">File</div>
      <div class="waiting-zone" id="wZone">
        <div class="wz-tunnel l"></div>
        <div class="wz-tunnel r"></div>
      </div>
    </div>
    <div class="cannons-box" id="cannonsBox"></div>
    <div class="bottom-row">
      <div class="status" id="status"></div>
      <button class="reset-btn" id="resetBtn">Reset</button>
    </div>
  </div>
</div>

<div class="overlay" id="goOverlay">
  <div class="ocard">
    <h2 class="go">Game Over !</h2>
    <p id="goMsg">Chemin bloqué !</p>
    <button onclick="resetGame()">Réessayer</button>
  </div>
</div>

<div class="overlay" id="winOverlay">
  <div class="ocard">
    <h2 class="win">Stitch est là !</h2>
    <p>En <b id="winShots">0</b> tirs</p>
    <button onclick="resetGame()">Rejouer</button>
  </div>
</div>

<script>
(() => {
  const N=20, MAX_SHOTS=10, CPR=5, VR=2;

  const T=[
    ['W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W'],
    ['W','W','W','W','P','P','W','W','DB','W','W','W','W','DB','DB','W','P','P','W','W'],
    ['W','W','W','P','P','DB','DB','W','DB','DB','W','W','DB','DB','DB','P','P','P','W','W'],
    ['W','W','W','P','DB','DB','DB','DB','DB','DB','DB','DB','DB','DB','DB','DB','P','W','W','W'],
    ['W','W','W','W','DB','DB','DB','DB','DB','DB','DB','DB','DB','DB','DB','DB','W','W','W','W'],
    ['W','W','W','W','W','DB','DB','LB','LB','LB','LB','LB','LB','DB','DB','W','W','W','W','W'],
    ['W','W','W','W','W','DB','LB','LB','LB','LB','LB','LB','LB','LB','DB','W','W','W','W','W'],
    ['W','W','W','W','DB','DB','LB','LB','K','K','LB','LB','K','K','DB','DB','W','W','W','W'],
    ['W','W','W','W','P','DB','LB','K','K','K','LB','K','K','K','DB','P','W','W','W','W'],
    ['W','W','W','W','W','DB','LB','LB','K','LB','LB','LB','K','LB','DB','W','W','W','W','W'],
    ['W','W','W','W','W','DB','DB','LB','LB','LB','LB','LB','LB','DB','DB','W','W','W','W','W'],
    ['W','W','W','W','W','W','DB','DB','LB','DB','DB','LB','DB','DB','W','W','W','W','W','W'],
    ['W','W','W','W','W','DB','DB','DB','DB','DB','DB','DB','DB','DB','DB','W','W','W','W','W'],
    ['W','W','W','W','W','W','DB','DB','DB','DB','DB','DB','DB','DB','W','W','W','W','W','W'],
    ['W','W','W','W','W','W','W','W','DB','DB','DB','DB','W','W','W','W','W','W','W','W'],
    ['W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W'],
    ['W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W'],
    ['W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W'],
    ['W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W'],
    ['W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W','W'],
  ];

  const CI={W:{n:'Blanc',b:'bW',c:'cW'},DB:{n:'Bleu foncé',b:'bDB',c:'cDB'},LB:{n:'Bleu clair',b:'bLB',c:'cLB'},P:{n:'Rose',b:'bP',c:'cP'},K:{n:'Noir',b:'bK',c:'cK'}};
  const CK=['W','DB','LB','P','K'];
  const GC={W:'gW',DB:'gDB',LB:'gLB',P:'gP',K:'gK'};

  // Accessibility from 4 edges
  function canFromBot(r,c){for(let i=N-1;i>r;i--)if(placed[i][c])return false;return true;}
  function canFromTop(r,c){for(let i=0;i<r;i++)if(placed[i][c])return false;return true;}
  function canFromLeft(r,c){for(let i=0;i<c;i++)if(placed[r][i])return false;return true;}
  function canFromRight(r,c){for(let i=N-1;i>c;i--)if(placed[r][i])return false;return true;}
  function isOK(r,c){return canFromBot(r,c)||canFromTop(r,c)||canFromLeft(r,c)||canFromRight(r,c);}
  function findBlocked(){
    for(let r=0;r<N;r++)for(let c=0;c<N;c++)
      if(!placed[r][c]&&!isOK(r,c))return{r,c};
    return null;
  }

  function buildFirePlan(color){
    const plan=[];
    for(let r=0;r<N;r++)for(let c=0;c<N;c++)
      if(T[r][c]===color&&!placed[r][c])plan.push({r,c});
    return plan;
  }

  function buildCannons(){
    const tot={W:0,DB:0,LB:0,P:0,K:0};
    for(let r=0;r<N;r++)for(let c=0;c<N;c++)tot[T[r][c]]++;
    const arr=[];let id=0;
    for(const k of CK){
      const t=tot[k];if(t<=0)continue;
      const f=Math.floor(t/MAX_SHOTS),d=t%MAX_SHOTS;
      for(let i=0;i<f;i++)arr.push({id:id++,color:k,max:MAX_SHOTS,rem:MAX_SHOTS,inZone:false,done:false,firing:false});
      if(d>0)arr.push({id:id++,color:k,max:d,rem:d,inZone:false,done:false,firing:false});
    }
    // Round-robin interleave
    const piles={};
    for(const cn of arr){if(!piles[cn.color])piles[cn.color]=[];piles[cn.color].push(cn);}
    for(const k of CK)if(piles[k])shuf(piles[k]);
    const res=[];let s=arr.length+10;
    while(res.length<arr.length&&s-->0)for(const k of CK)if(piles[k]&&piles[k].length)res.push(piles[k].shift());
    return res;
  }
  function shuf(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}}

  // ── STATE ───────────────────────────────────────────────────────────────
  let placed, cannons, shots, gameOver;

  const $ = id => document.getElementById(id);
  const gridEl  = $('grid'),
        cBox    = $('cannonsBox'),
        wZ      = $('wZone'),
        stEl    = $('status'),
        gO      = $('gridOuter'),
        rB      = $('railBorder'),
        sS      = $('sShots'),
        sP      = $('sProg'),
        wO      = $('winOverlay'),
        wS      = $('winShots'),
        gOv     = $('goOverlay'),
        gM      = $('goMsg');

  // ── BELT ────────────────────────────────────────────────────────────────
  const BELT_SPEED = 100;   // px/s — slow enough to see
  const CARD_W     = 64;   // approx card width px
  const FIRE_COOLDOWN = 100; // ms between shots per cannon

  // per-cannon belt state
  // { id, x, lastFired, planIdx }
  let beltState = new Map();
  let firePlan  = new Map(); // cannonId -> [{r,c}] remaining cells
  let beltRAF   = null;
  let beltLast  = null;

  function beltCannons() {
    return cannons.filter(c => c.inZone && !c.done && c.rem > 0);
  }

  // Build fire plan for a cannon: all unplaced cells of its color, row by row
  function makePlan(cn) {
    const plan = [];
    for (let r = 0; r < N; r++)
      for (let c = 0; c < N; c++)
        if (T[r][c] === cn.color && !placed[r][c]) plan.push({r, c});
    return plan;
  }

  function addCannonToBelt(cn) {
    cn.inZone = true;
    cn.done   = false;
    firePlan.set(cn.id, makePlan(cn));
    // start just off left edge
    beltState.set(cn.id, { x: -CARD_W, lastFired: -Infinity });
    renderBeltCard(cn);
    renderCannons();
    updStats();
    startBelt();
  }

  function renderBeltCard(cn) {
    let el = wZ.querySelector(`[data-id="${cn.id}"]`);
    if (!el) {
      el = document.createElement('div');
      el.dataset.id = cn.id;
      el.className  = 'wz-cannon';
      el.innerHTML  = `<div class="wz-dot ${CI[cn.color].b}"></div><div class="wz-count">${cn.rem}</div>`;
      wZ.appendChild(el);
    } else {
      el.querySelector('.wz-count').textContent = cn.rem;
    }
    const st = beltState.get(cn.id);
    if (st) el.style.left = st.x + 'px';
  }

  function removeCannonFromBelt(cn) {
    const el = wZ.querySelector(`[data-id="${cn.id}"]`);
    if (el) el.remove();
    beltState.delete(cn.id);
    firePlan.delete(cn.id);
  }

  // Animate flying pixel from cannon to grid cell
  function firePixel(cn, r, c) {
    const cannonEl = wZ.querySelector(`[data-id="${cn.id}"]`);
    const cellEl   = gridEl.children[r * N + c];
    if (!cannonEl || !cellEl) return;

    const cr = cannonEl.getBoundingClientRect();
    const gr = cellEl.getBoundingClientRect();

    const px = document.createElement('div');
    px.className = 'fly-pixel ' + CI[cn.color].c;
    px.style.cssText = `
      left:${cr.left + cr.width/2 - 5}px;
      top:${cr.top + cr.height/2 - 5}px;
      background: var(--col-${cn.color});
      opacity:1;
    `;
    document.body.appendChild(px);

    // Force reflow then animate
    requestAnimationFrame(() => {
      px.style.left    = (gr.left + gr.width/2 - 5) + 'px';
      px.style.top     = (gr.top + gr.height/2 - 5) + 'px';
      px.style.opacity = '0';
    });

    setTimeout(() => {
      px.remove();
      // Place the pixel in grid
      placed[r][c] = true;
      shots++;
      cn.rem--;
      renderGrid();
      updStats();
      // Update ammo on card
      const cardEl = wZ.querySelector(`[data-id="${cn.id}"]`);
      if (cardEl) cardEl.querySelector('.wz-count').textContent = cn.rem;

      playPop();

      // Check win
      const {d, t} = prog();
      if (d === t) {
        setTimeout(() => { wS.textContent = shots; wO.classList.add('show'); }, 400);
        return;
      }

      // If empty, remove
      if (cn.rem <= 0) {
        cn.done = true;
        removeCannonFromBelt(cn);
        renderCannons();
        setSt('');
      }
    }, 260);
  }

  function startBelt() {
    if (beltRAF) return;
    beltLast = null;
    function tick(ts) {
      if (!beltLast) beltLast = ts;
      const dt = Math.min((ts - beltLast) / 1000, 0.05);
      beltLast = ts;

      const active = beltCannons();
      if (!active.length) { beltRAF = null; showEmptyBelt(); return; }

      const trackW = wZ.getBoundingClientRect().width || 300;

      for (const cn of active) {
        let st = beltState.get(cn.id);
        if (!st) continue;

        // Move
        st.x += BELT_SPEED * dt;
        if (st.x > trackW) st.x = -CARD_W;

        // Update DOM position
        const el = wZ.querySelector(`[data-id="${cn.id}"]`);
        if (el) el.style.left = st.x + 'px';

        // Only fire when cannon is fully visible on the belt
        if (st.x < 0 || st.x + CARD_W > trackW) continue;

        // Check if should fire
        const plan = firePlan.get(cn.id);
        if (!plan || !plan.length) continue;

        const now = ts;
        if (now - st.lastFired < FIRE_COOLDOWN) continue;

        // Find next unplaced cell in plan
        while (plan.length && placed[plan[0].r][plan[0].c]) plan.shift();
        if (!plan.length) { cn.done = true; removeCannonFromBelt(cn); renderCannons(); continue; }

        const {r, c} = plan[0];
        plan.shift();
        st.lastFired = now;

        firePixel(cn, r, c);
      }

      beltRAF = requestAnimationFrame(tick);
    }
    beltRAF = requestAnimationFrame(tick);
  }

  function stopBelt() {
    if (beltRAF) { cancelAnimationFrame(beltRAF); beltRAF = null; }
  }

  function showEmptyBelt() {
    // Remove all cards
    for (const el of [...wZ.querySelectorAll('.wz-cannon')]) el.remove();
    // Show empty label if none
    if (!wZ.querySelector('.wz-empty')) {
      const s = document.createElement('span');
      s.className = 'wz-empty';
      s.textContent = 'Clique un canon';
      wZ.appendChild(s);
    }
    wZ.classList.remove('active');
  }
  // ── END BELT ─────────────────────────────────────────────────────────────

  function prog() {
    let d = 0;
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) if (placed[r][c]) d++;
    return {d, t: N * N};
  }
  function avail() { return cannons.filter(c => !c.inZone && !c.done && c.rem > 0); }

  function renderGrid() {
    gridEl.innerHTML = '';
    for (let r = 0; r < N; r++) for (let c = 0; c < N; c++) {
      const cell = document.createElement('div');
      cell.className = 'gc ' + GC[T[r][c]];
      cell.style.position = 'relative';
      if (placed[r][c]) {
        const cb = document.createElement('div');
        cb.className = 'cube ' + CI[T[r][c]].c;
        cell.appendChild(cb);
      }
      gridEl.appendChild(cell);
    }
  }

  function renderCannons() {
    cBox.innerHTML = '';
    if (gameOver) { cBox.innerHTML = '<div style="color:var(--danger);font-size:.75rem;font-weight:600">Game Over</div>'; return; }
    const av = avail();
    if (!av.length) { cBox.innerHTML = '<div style="color:var(--muted);font-size:.72rem;font-style:italic">Plus de canons</div>'; return; }
    const CPR = 5, VR = 2;
    const vis = av.slice(0, CPR * VR);
    for (let s = 0; s < vis.length; s += CPR) {
      const rd = document.createElement('div');
      rd.className = 'cannons-row';
      for (const cn of vis.slice(s, s + CPR)) {
        const el = document.createElement('div');
        el.className = 'cannon';
        el.innerHTML = `<div class="cannon-barrel ${CI[cn.color].b}"></div><div class="cannon-ammo">${cn.rem}</div>`;
        el.addEventListener('click', () => {
          if (gameOver) return;
          // Remove empty label
          const emp = wZ.querySelector('.wz-empty');
          if (emp) emp.remove();
          wZ.classList.add('active');
          addCannonToBelt(cn);
          setSt(`${CI[cn.color].n} (${cn.rem})`, 'ok');
        });
        rd.appendChild(el);
      }
      cBox.appendChild(rd);
    }
  }

  function updStats() {
    sS.textContent = shots;
    const {d, t} = prog();
    sP.textContent = Math.round(d / t * 100) + '%';
  }
  function setSt(m, t = '') { stEl.textContent = m; stEl.className = 'status ' + t; }

  const popSnd = 'data:audio/mp3;base64,//vQZAAABlBozm09gABoz2ggoIgAKg4pQBnsgAGYxSSXAiAABoAAQAAKajpOC4HQyKhvhl/CPgCgBMFgcU+h6vj+dOxDEMEwJju0JZPflslg3J7QlluyzjsSyfADcnxrHNXvpBDEdWws677Bmf+wYGCxYsMz9f7BgYHlThzfYJANBEUMc2fvwHER2DQSDzvmlNWOa2vXr15mJBMEQ8qdmZ/Hf6c2diWfwCWf4sWVXvpDM/sxTV77Bmf2WLO3DAG4jn973X+wBMRz/FjlFhIAmB8RyefvzO06ZYMCQYcsc1e/9KasWZcHAQ/6wfB8EBj/5jGMY236EOc5znOcDAAAAACEJ/o3znOf0ITkb/yEIQjdCEb6EAAAkhCNOc79CEI3znOc5CEIQmchCEJqcAABBKnP/P/IQhBYGBgYGBgZ5zn//nOQhCEI3kboQDAwM53/QgQAIoAAEMBYF4wUAkQqH0YxpEgNAKMBIFUxCwpzC1BxMqsHA0AQJTBeAoMVI38wQgJjA9AjMOABIwbQTTYWJcMLIGoPKB6LvqaMdh8PbOkA1hyycrQaZrVkA1UbIRiBjIDC4S0pgd13ZylC5hAKOBIvJzv279FC464FWKWpYWYL4I1hABMKRBQLFnZnHeazT3qbluMoWF6S9StCXqgy/dQPADhQEwJS+xuW00tl0NNJdhrb/skYm5ykV7uBI4zXlsscGHXYsztFScoa1PPtaYi1dhzSYGZs3OAGbQ2zlrs5BsVfCBX+izhKbasRWvcl05SRWa6uR6o24EAZORZh6KN7A0tc2NOm4Vt436mcKSm3TcqzNLnMfKdZYUF3LHly5Lb0tzllLX5PSmjtTsxZuyv///////+p8M3LOeq167NZTu/pP////////ou48sVdX62M1P0mrMAAAAA';
  function playPop() { const a = new Audio(popSnd); a.volume = 0.4; a.play().catch(() => {}); }
  function slp(ms) { return new Promise(r => setTimeout(r, ms)); }

  window.resetGame = function() {
    stopBelt();
    beltState = new Map();
    firePlan  = new Map();
    for (const el of [...wZ.querySelectorAll('.wz-cannon')]) el.remove();
    cannons   = buildCannons();
    placed    = Array.from({length: N}, () => Array(N).fill(false));
    shots     = 0; gameOver = false;
    wO.classList.remove('show'); gOv.classList.remove('show');
    rB.classList.remove('active');
    setSt('');
    renderGrid(); renderCannons(); updStats();
    showEmptyBelt();
  };

  $('resetBtn').addEventListener('click', () => resetGame());
  resetGame();
})();
</script>
