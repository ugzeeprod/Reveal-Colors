   .dot {
  width: 52px;
  height: 52px;
  border-radius: 50%;
  position: relative;
  flex-shrink: 0;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  /* 🔥 cercle de progression */
  background: conic-gradient(
    #ff7ac4 var(--progress, 100%), 
    #eee var(--progress, 100%)
  );

  padding: 4px;
}

/* intérieur (couleur réelle) */
.dotInner {
  width: 100%;
  height: 100%;
  border-radius: 50%;
}
    .dot.active {
      transform: scale(1.12);
      border-width: 4px;
      border-color: #ff7ac4;
      box-shadow: 0 0 12px rgba(255,255,255,0.8), 0 4px 14px rgba(0,0,0,0.25);
      animation: pulseDot 0.25s ease;
    }
    
    .backLink {
      font-size: 13px;
      color: #6874c8;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .backLink span { font-size: 16px; }

    

    @keyframes pulseDot {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    /* Pastille qui disparaît en douceur */
    .dot.disappearing {
      animation: dotDisappear 0.55s ease forwards;
    }
    @keyframes dotDisappear {
      0% {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
      60% {
        transform: scale(0.45) rotate(12deg);
        opacity: 0.6;
      }
      100% {
        transform: scale(0.1) rotate(25deg);
        opacity: 0;
      }
    }

/* ===== CONVEYOR BELT + COLOR BLOCKS ===== */

.conveyorZone {
  width: 100%;
  height: 48px;
  position: relative;
  background: #e8e8f0;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: inset 0 2px 6px rgba(0,0,0,0.12);

}

.colorBlocksRow {
  display: flex;
  flex-direction: row;
  gap: 8px;
  padding: 6px 10px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-x;
  align-items: center;
  min-height: 64px;
  scroll-snap-type: x proximity;
}
.colorBlocksRow::-webkit-scrollbar { display: none; }

.colorBlock {
  scroll-snap-align: start;
}

.colorBlock {
  flex-shrink: 0;
  width: 48px;
  height: 48px;
  border-radius: 12px;
  cursor: pointer;
  position: relative;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  overflow: hidden;
  box-shadow: 0 3px 8px rgba(0,0,0,0.2);
  transition: transform 0.1s ease, box-shadow 0.1s ease;
  border: 2px solid rgba(255,255,255,0.3);
}
.colorBlock:active { transform: scale(0.93); }
.colorBlock.active {
  transform: scale(1.1);
  box-shadow: 0 0 0 3px white, 0 4px 14px rgba(0,0,0,0.3);
}
.colorBlock.depleted {
  opacity: 0.25;
  pointer-events: none;
  transform: scale(0.85);
}

/* jauge de remplissage qui monte */
.colorBlockFill {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,0.35);
  transition: height 0.3s ease;
}

/* étiquette % */

/* ===== SPLASH SCREEN ===== */
#splashScreen {
  position: fixed;
  inset: 0;
  background: linear-gradient(135deg,#fbe9f0,#e5f0ff);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
  opacity: 1;
  animation: splashFade 0.6s ease forwards 4.5s; /* fade-out */
}

#splashLogo {
  width: 120px;
  height: 120px;
  margin-bottom: 18px;
  opacity: 0;
  border-radius: 28px;       /* ⬅️ arrondi style app iOS */
  box-shadow: 0 6px 18px rgba(0,0,0,0.12);
  overflow: hidden;          /* ⬅️ pour que les bords soient nets */
  transform: scale(0.6);
  animation: logoPop 0.7s ease-out forwards;
}


.splashTitle {
  font-size: 28px;
  font-weight: 700;
  color: #ff6fb5;
  opacity: 0;
  animation: fadeIn 1s ease forwards 0.4s;
}

.splashSubtitle {
  font-size: 14px;
  margin-top: 6px;
  color: #666;
  opacity: 0;
  animation: fadeIn 1s ease forwards 0.8s;
}

/* === Animations === */

@keyframes logoPop {
  0% { opacity:0; transform:scale(0.6); }
  60% { opacity:1; transform:scale(1.08); }
  100% { opacity:1; transform:scale(1); }
}

@keyframes fadeIn {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

@keyframes splashFade {
  to { opacity: 0; visibility: hidden; }
}

<script>

// ================= BASE PATH (GitHub Pages) ==================
const BASE_PATH = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);

// ================= IndexedDB Helper + Compression ==================

const DB_NAME = "RevealColorsDB";
const STORE_NAME = "levelProgress";
const DB_VERSION = 1;

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = (event) => {
      const db = event.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: "id" });
      }
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

async function idbSet(key, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readwrite");
    tx.objectStore(STORE_NAME).put({ id: key, value });
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function idbGet(key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, "readonly");
    const req = tx.objectStore(STORE_NAME).get(key);
    req.onsuccess = () => resolve(req.result ? req.result.value : null);
    req.onerror = () => reject(req.error);
  });
}

function compressGrid(grid) {
  const revealed = [];
  for (let y = 0; y < grid.length; y++) {
    for (let x = 0; x < grid[y].length; x++) {
      if (grid[y][x] === -1) revealed.push(`${x},${y}`);
    }
  }
  return revealed;
}

function decompressGrid(revealedList, baseGrid) {
  const grid = baseGrid.map(row => row.slice());
  if (!revealedList) return grid;
  for (const str of revealedList) {
    const [x,y] = str.split(',').map(Number);
    grid[y][x] = -1;
  }
  return grid;
}
// ====================================================================



  // =========================
  // HAPTIC / VIBRATION HELPER
  // =========================
  function triggerHaptic(level = "light") {
    try {
      if ("vibrate" in navigator) {
        if (level === "heavy") {
          navigator.vibrate(30);
        } else if (level === "medium") {
          navigator.vibrate(15);
        } else {
          navigator.vibrate(8);
        }
      }
    } catch (e) {
      console.warn("Haptic error", e);
    }
  }

  // =========================
  // STATE GLOBAL
  // =========================
  let LEVELS_DATA = { collections: [] };

  const screens = {
    home: document.getElementById("screen-home"),
    collections: document.getElementById("screen-collections"),
    levels: document.getElementById("screen-levels"),
    game: document.getElementById("screen-game")
  };


  // Empêche la page de scroller pendant le jeu
  const screenGameEl = document.getElementById("screen-game");

  function lockBodyScrollForGame(enable) {
    if (enable) {
      // On mémorise l'état précédent pour le restaurer ensuite
      document.body.dataset.prevOverflow = document.body.style.overflow || "";
      document.body.style.overflow = "hidden";
    } else {
      if (document.body.dataset.prevOverflow !== undefined) {
        document.body.style.overflow = document.body.dataset.prevOverflow;
        delete document.body.dataset.prevOverflow;
      } else {
        document.body.style.overflow = "";
      }
    }
  }

  // Sur iOS, on doit empêcher le comportement par défaut sur les touchmove
 screenGameEl.addEventListener("touchmove", (e) => {
  if (!screenGameEl.classList.contains("fullscreen")) return;

  // Si on glisse dans la palette (scroll horizontal), on laisse passer !
  if (e.target.closest(".paletteRow") || e.target.closest(".colorBlocksRow")) return;

  // Sinon on bloque le scroll
  e.preventDefault();
}, { passive: false });

  // ============================================================
  // 🚫 BLOQUER LE PINCH-ZOOM NATIF iOS (ignoré par user-scalable=no)
  // ============================================================
  // Bloque le pinch-zoom partout sur la page (2+ doigts = preventDefault)
  document.addEventListener('touchmove', (e) => {
    if (e.touches.length >= 2) {
      e.preventDefault();
    }
  }, { passive: false });

  // Bloque aussi les gesture events Safari (pinch trackpad + tactile)
  document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
  document.addEventListener('gesturechange', (e) => e.preventDefault(), { passive: false });
  document.addEventListener('gestureend', (e) => e.preventDefault(), { passive: false });



 function showScreen(name) {
    // 1. Cacher tous les écrans
    document.querySelectorAll(".screen").forEach(s => {
        s.classList.remove("active");
    });

    // 2. Afficher celui qu’on veut
    if (screens[name]) {
        screens[name].classList.add("active");
    }
}


  // --- progression globale
  function computeGlobalProgress() {
    const total = LEVELS_DATA.collections.reduce(
      (sum,c)=>sum + (c.levels?.length||0),
      0
    );
    let completed = 0;
    try {
      const raw = localStorage.getItem("sbn_completed_levels");
      if (raw){
        const arr = JSON.parse(raw);
        if (Array.isArray(arr)) completed = arr.length;
      }
    } catch{}
    if (completed>total) completed=total;
    return {completed,total};
  }

async function saveLevelProgressData(payload) {

  const key = levelProgressKey(payload.collectionId, payload.levelId);
  const compact = {
    collectionId: payload.collectionId,
    levelId: payload.levelId,
    percent: payload.percent,
    completed: payload.completed,
    revealedCells: compressGrid(payload.grid)
  };
  try {

    console.error("IndexedDB save error:", e);
  }
}

async function drawLevelThumbnail(canvas, collectionId, levelId) {
  try {
    const ctx = canvas.getContext("2d");

    // reset
    canvas.width = canvas.width;

    const base = BASE_PATH + `levels/${levelId}`;
    const levelRes = await fetch(base + ".json");
    const levelData = await levelRes.json();
    const palette = levelData.palette;
    const baseGrid = levelData.grid;

    const saved = await loadLevelProgressData(collectionId, levelId);

    const gridW = baseGrid[0].length;
    const gridH = baseGrid.length;

    const cellW = canvas.width / gridW;
    const cellH = canvas.height / gridH;

    // =========================
    // 1️⃣ IMAGE COMPLETE (base)
    // =========================
    for (let y = 0; y < gridH; y++) {
      for (let x = 0; x < gridW; x++) {
        const colorIndex = baseGrid[y][x];
        const col = palette[colorIndex];

        ctx.fillStyle = `rgb(${col.r}, ${col.g}, ${col.b})`;
        ctx.fillRect(x * cellW, y * cellH, cellW, cellH);
      }
    }

    // =========================
    // 2️⃣ BLUR GLOBAL (mystère)
    // =========================
    let percent = saved?.percent || 0;
    let progress = percent / 100;

    let blurAmount = (1 - progress) * 6; // 6px → 0px

    ctx.filter = `blur(${blurAmount}px)`;
    ctx.drawImage(canvas, 0, 0);
    ctx.filter = "none";

    // =========================
    // 3️⃣ ZONES RÉVÉLÉES NETTES
    // =========================
    if (saved && saved.revealedCells) {
      for (const str of saved.revealedCells) {
        const [x, y] = str.split(',').map(Number);

        const colorIndex = baseGrid[y][x];
        const col = palette[colorIndex];

        ctx.fillStyle = `rgb(${col.r}, ${col.g}, ${col.b})`;
        ctx.fillRect(x * cellW, y * cellH, cellW, cellH);
      }
    }

    // =========================
    // 4️⃣ SI TERMINÉ → IMAGE FULL
    // =========================
    if (saved?.completed) {
      ctx.filter = "none";

      for (let y = 0; y < gridH; y++) {
        for (let x = 0; x < gridW; x++) {
          const colorIndex = baseGrid[y][x];
          const col = palette[colorIndex];

          ctx.fillStyle = `rgb(${col.r}, ${col.g}, ${col.b})`;
          ctx.fillRect(x * cellW, y * cellH, cellW, cellH);
        }
      }
    }

  } catch (e) {
    console.warn("Impossible de dessiner la miniature", e);
  }
}

  function computeCountsFromGrid(grid, paletteLength) {
    const counts = new Array(paletteLength).fill(0); 
    let revealed = 0;
    const gridH = grid.length;
    const gridW = grid[0].length;
    for (let y=0;y<gridH;y++){
      for(let x=0;x<gridW;x++){
        const v = grid[y][x];
        if (v === -1) {
          revealed++;
        } else if (v>=0 && v<paletteLength) {
          counts[v]++;
        }
      }
    }
    return {counts,revealed};
  }

const MATCH_COUNT = 3;
const WAIT_MAX = 7;

let bjGrid = [];       // tableau plat [colorIndex ou -1]
let bjCols = 5;
let bjRows = 5;
let bjWait = [];       // zone d'attente
let bjGameOver = false;
let bjAnimating = false; // bloque les clics pendant une animation

// Groupes de couleurs similaires : bjColorGroup[paletteIdx] = groupIdx
let bjColorGroups = [];
let bjGroupColors = []; // couleur moyenne de chaque groupe [r,g,b]

function bjBuildColorGroups() {
  const palette = currentGame.palette;
  bjColorGroups = new Array(palette.length).fill(-1);
  bjGroupColors = [];
  const TOLERANCE = 30; // distance max pour regrouper

  palette.forEach((c, i) => {
    if ((currentGame.remainingPerColor[i]||0) <= 0) return;
    // cherche un groupe existant proche
    let found = -1;
    for (let g = 0; g < bjGroupColors.length; g++) {
      const [gr, gg, gb] = bjGroupColors[g];
      const dist = Math.abs(c.r-gr) + Math.abs(c.g-gg) + Math.abs(c.b-gb);
      if (dist < TOLERANCE) { found = g; break; }
    }
    if (found === -1) {
      found = bjGroupColors.length;
      bjGroupColors.push([c.r, c.g, c.b]);
    }
    bjColorGroups[i] = found;
  });
}

function bjColorFromGroup(groupIdx) {
  const [r,g,b] = bjGroupColors[groupIdx] || [200,200,200];
  return `rgb(${r},${g},${b})`;
}

function bjColorFromPalette(i) {
  // Toujours utiliser directement la palette via bjColorGroups
  const c = currentGame.palette[i];
  return c ? `rgb(${c.r},${c.g},${c.b})` : '#ccc';
}

function bjGetGroup(ci) {
  // En mode gameGrid : identité (paletteIdx = groupIdx)
  // En mode génération : utiliser bjColorGroups
  if (currentGame.gameGrid) return ci;
  return bjColorGroups[ci] >= 0 ? bjColorGroups[ci] : ci;
}

const ROCK = -2; // gardé pour compatibilité mais plus utilisé

function bjPlaceRocks() {} // désactivé — plus de rochers

function bjBuildGrid() {
  bjBuildColorGroups();

  const availableGroups = [...new Set(
    currentGame.palette
      .map((_,idx) => bjColorGroups[idx])
      .filter((g, idx) => g >= 0 && (currentGame.remainingPerColor[idx]||0) > 0)
  )];

  if (!availableGroups.length) return;

  // Pool = exactement 3 pastilles par groupe
  const pool = [];
  availableGroups.forEach(g => pool.push(g, g, g));

  // Taille de grille exacte sans cases vides
  const total = pool.length; // toujours multiple de 3
  bjCols = Math.min(6, Math.ceil(Math.sqrt(total)));
  // Ajuster les colonnes pour que total soit divisible
  while (total % bjCols !== 0 && bjCols > 2) bjCols--;
  bjRows = total / bjCols;

  // Mélanger — garantir qu'au moins une pastille de chaque groupe est en row 0
  const shuffledGroups = [...availableGroups];
  for (let i = shuffledGroups.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffledGroups[i], shuffledGroups[j]] = [shuffledGroups[j], shuffledGroups[i]];
  }

  bjGrid = new Array(bjCols * bjRows).fill(-1);

  // Row 0 : une pastille de chaque groupe (jusqu'à bjCols groupes)
  const row0Groups = shuffledGroups.slice(0, bjCols);
  row0Groups.forEach((g, col) => {
    const idx = currentGame.palette.findIndex((_,pi) =>
      bjColorGroups[pi] === g && (currentGame.remainingPerColor[pi]||0) > 0
    );
    bjGrid[col] = idx >= 0 ? idx : -1;
  });

  // Reste : les 2 pastilles restantes de chaque groupe
  const remaining = [];
  pool.forEach(g => {
    const placedCount = bjGrid.filter(ci => ci >= 0 && (bjColorGroups[ci] >= 0 ? bjColorGroups[ci] : ci) === g).length;
    const toPlace = 3 - placedCount;
    for (let i = 0; i < toPlace; i++) {
      const idx = currentGame.palette.findIndex((_,pi) =>
        bjColorGroups[pi] === g && (currentGame.remainingPerColor[pi]||0) > 0
      );
      remaining.push(idx >= 0 ? idx : -1);
    }
  });

  // Mélanger le reste
  for (let i = remaining.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
  }

  // Remplir les cases vides (row 1+)
  let ri = 0;
  for (let i = bjCols; i < bjGrid.length; i++) {
    if (bjGrid[i] === -1 && ri < remaining.length) {
      bjGrid[i] = remaining[ri++];
    }
  }
}

function bjIsAccessible(idx) {
  return bjFindPath(idx) !== null;
}

// Retourne le chemin (liste d'indices) de la pastille jusqu'à la sortie (row -1 = dehors)
// ou null si bloquée
function bjFindPath(idx) {
  const startRow = Math.floor(idx / bjCols);
  const startCol = idx % bjCols;
  const dirs = [[-1,0],[1,0],[0,-1],[0,1]];

  // BFS avec reconstruction du chemin
  const visited = new Map(); // ni → parent ni (ou -1 pour la source)
  const queue = [];

  // On part des voisins vides immédiats de la pastille
  for (const [dr, dc] of dirs) {
    const r = startRow + dr;
    const c = startCol + dc;
    if (r < 0) {
      // Sortie directe par le haut — chemin = [idx]
      return [idx];
    }
    if (r >= bjRows || c < 0 || c >= bjCols) continue;
    const ni = r * bjCols + c;
    if (bjGrid[ni] === -1 && !visited.has(ni)) {
      visited.set(ni, idx); // parent = pastille de départ
      queue.push([r, c, ni]);
    }
  }

  while (queue.length > 0) {
    const [r, c, cur] = queue.shift();
    // Si on est en row 0, on peut sortir par le haut
    if (r === 0) {
      // Reconstruire le chemin à rebours
      const path = [];
      let node = cur;
      while (node !== idx) {
        path.unshift(node);
        node = visited.get(node);
      }
      path.unshift(idx);
      return path;
    }
    for (const [dr, dc] of dirs) {
      const nr = r + dr;
      const nc = c + dc;
      if (nr < 0) {
        // Sortie par le haut depuis r=0 non atteint encore
        const path = [];
        let node = cur;
        while (node !== idx) {
          path.unshift(node);
          node = visited.get(node);
        }
        path.unshift(idx);
        return path;
      }
      if (nr >= bjRows || nc < 0 || nc >= bjCols) continue;
      const ni = nr * bjCols + nc;
      if (bjGrid[ni] === -1 && !visited.has(ni)) {
        visited.set(ni, cur);
        queue.push([nr, nc, ni]);
      }
    }
  }

  return null; // bloquée
}

function bjCellSize() {
  // Mesure l'espace réellement disponible dans gameBottomZone
  const bottomZone = document.getElementById('gameBottomZone');
  const waitZone = document.getElementById('waitZoneRow');
  const msgEl = document.getElementById('bjMsg');

  // Hauteur disponible pour la grille seule
  let availH = 0;
  if (bottomZone) {
    const zoneH = bottomZone.getBoundingClientRect().height;
    const waitH = waitZone ? waitZone.getBoundingClientRect().height || 54 : 54;
    const msgH = msgEl ? 20 : 0;
    const gaps = 8 * 3; // gap entre éléments
    availH = zoneH - waitH - msgH - gaps - 16; // 16px padding
  } else {
    // Fallback : estimation
    availH = window.innerHeight * 0.38;
  }

  // Largeur disponible
  const availW = Math.min(window.innerWidth, 500) - 32;

  const sizeByW = Math.floor(availW / bjCols) - 6;
  const sizeByH = bjRows > 0 ? Math.floor(availH / bjRows) - 4 : 64;

  const maxSize = 68;
  const minSize = 32;
  return Math.max(minSize, Math.min(sizeByW, sizeByH, maxSize));
}

function bjMake3DColor(baseColor) {
  // Crée un dégradé 3D à partir d'une couleur de base
  return `radial-gradient(ellipse at 35% 30%, color-mix(in srgb, ${baseColor} 60%, white 40%) 0%, ${baseColor} 55%, color-mix(in srgb, ${baseColor} 70%, black 30%) 100%)`;
}

function bjRenderGrid() {

  for (let row = 0; row < bjRows; row++) {
    for (let col = 0; col < bjCols; col++) {

        cell.style.cssText = base + `border-radius:50%;cursor:pointer;`;

function bjGetCellCenter(idx) {
  // Retourne la position centrale d'une case dans la grille (coordonnées écran)
  const gridEl = document.getElementById('blockJamGrid');
  if (!gridEl) return null;
  const cells = gridEl.children;
  if (!cells[idx]) return null;
  const r = cells[idx].getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2, w: r.width };
}

function bjAnimateAlongPath(path, ci, onComplete) {
  if (!path || path.length === 0) { onComplete(); return; }

  const color = bjColorFromPalette(ci);
  const shadowColor = color.replace('rgb(', 'rgba(').replace(')', ',0.5)');

  const startPos = bjGetCellCenter(path[0]);
  if (!startPos) { onComplete(); return; }

  const sz = startPos.w;

  const fly = document.createElement('div');
  fly.style.cssText = `
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    border-radius: 50%;
    width: ${sz}px;
    height: ${sz}px;
    background: ${bjMake3DColor(color)};
    box-shadow: 0 ${Math.round(sz*0.12)}px 0 ${shadowColor}, 0 4px 12px rgba(0,0,0,0.25);
    border: 2.5px solid rgba(255,255,255,0.5);
    transform: translate(-50%, -50%);
    left: ${startPos.x}px;
    top: ${startPos.y}px;
    transition: left 0.09s ease, top 0.09s ease;
    will-change: left, top;
  `;
  document.body.appendChild(fly);

  const STEP_MS = 90;
  let step = 1;

  function moveNext() {
    if (step >= path.length) {
      flyToWaitZone();
      return;
    }
    const pos = bjGetCellCenter(path[step]);
    if (pos) {
      fly.style.left = pos.x + 'px';
      fly.style.top  = pos.y + 'px';
    }
    step++;
    setTimeout(moveNext, STEP_MS);
  }

  function flyToWaitZone() {
    const waitRow = document.getElementById('waitZoneRow');
    const slotIdx = bjWait.length - 1;
    const slots = waitRow ? waitRow.querySelectorAll('div') : [];
    const slot = slots[slotIdx];

    if (slot) {
      const toRect = slot.getBoundingClientRect();
      const tx = toRect.left + toRect.width / 2;
      const ty = toRect.top  + toRect.height / 2;

      // Voler vers le slot
      fly.style.transition = 'left 0.2s cubic-bezier(0.34,1.3,0.64,1), top 0.2s cubic-bezier(0.34,1.3,0.64,1), transform 0.2s';
      fly.style.left = tx + 'px';
      fly.style.top  = ty + 'px';
      fly.style.transform = 'translate(-50%,-50%) scale(1)';

      setTimeout(() => {
        // Disparaît — le slot réel prend le relais
        fly.remove();
        // Re-render la zone d'attente AVEC le slot maintenant visible
        bjRenderWait();
        // Maintenant vérifier le match
        onComplete();
      }, 200);
    } else {
      fly.remove();
      bjRenderWait();
      onComplete();
    }
  }

  setTimeout(moveNext, STEP_MS);
}

function bjOnCellClick(idx) {
  if (bjGameOver || bjAnimating) return;
  const ci = bjGrid[idx];
  if (ci === -1 || ci === ROCK) return;
  if (!bjIsAccessible(idx)) return;
  if (bjWait.length >= WAIT_MAX) { bjSetMsg('Zone pleine !'); return; }

  // Trouver le chemin avant de modifier la grille
  const path = bjFindPath(idx);

  // Mettre à jour l'état
  bjWait.push(ci);
  bjGrid[idx] = -1;
  triggerHaptic('light');
  bjAnimating = true;

  // Re-render immédiatement (la case devient vide)
  bjRenderGrid();
  bjRenderWait();

  // Animer la pastille le long du chemin
  // On passe le groupe de la pastille qui vient d'arriver
  const newGroup = bjGetGroup(ci);
  bjAnimateAlongPath(path, ci, () => {
    bjAnimating = false;
    bjRenderWait();
    bjCheckMatch(newGroup);
    bjCheckGameOver();
  });
}

function bjSortWait() {
  bjWait.sort((a, b) => {
    return bjGetGroup(a) - bjGetGroup(b);
  });
}

function bjRenderWait(skipSort) {
  // Ne pas trier pendant une animation — la pastille doit aller au bon slot
  if (!skipSort && !bjAnimating) bjSortWait();
  const row = document.getElementById('waitZoneRow');
  if (!row) return;
  const sz = Math.min(bjCellSize(), 44);
  row.innerHTML = '';
  for (let i = 0; i < WAIT_MAX; i++) {
    const slot = document.createElement('div');
    slot.style.cssText = `width:${sz}px;height:${sz}px;border-radius:50%;box-sizing:border-box;flex-shrink:0;transition:all 0.15s;`;
    if (i < bjWait.length) {
      const color = bjColorFromPalette(bjWait[i]);
      const shadowColor = color.replace('rgb(', 'rgba(').replace(')', ',0.45)');
      slot.style.background = bjMake3DColor(color);
      slot.style.boxShadow  = `0 ${Math.round(sz*0.1)}px 0 ${shadowColor}, 0 2px 8px rgba(0,0,0,0.15)`;
      slot.style.border     = '2.5px solid rgba(255,255,255,0.5)';
    } else {
      slot.style.background = 'rgba(0,0,0,0.06)';
      slot.style.border     = '2px dashed rgba(0,0,0,0.12)';
    }
    row.appendChild(slot);
  }
}

function bjCheckMatch(newGroup) {
  // Compter uniquement le groupe de la pastille qui vient d'arriver
  if (newGroup === undefined) return;

  const count = bjWait.filter(ci => bjGetGroup(ci) == newGroup).length;

  if (count >= MATCH_COUNT) {
    const matchIndices = [];
    bjWait.forEach((ci, i) => {
      if (bjGetGroup(ci) == newGroup && matchIndices.length < MATCH_COUNT) matchIndices.push(i);
    });

    // Animer le pop des 3 slots
    const waitRow = document.getElementById('waitZoneRow');
    const slots = waitRow ? waitRow.querySelectorAll('div') : [];
    matchIndices.forEach((slotIdx, i) => {
      const slot = slots[slotIdx];
      if (!slot) return;
      setTimeout(() => {
        slot.style.transition = 'transform 0.15s cubic-bezier(0.34,1.56,0.64,1)';
        slot.style.transform = 'scale(1.35)';
        setTimeout(() => {
          slot.style.transform = 'scale(0)';
          slot.style.opacity = '0';
        }, 150);
      }, i * 60);
    });

    // Après l'animation → retirer et révéler
    setTimeout(() => {
      let removed = 0;
      bjWait = bjWait.filter(ci => {
        if (bjGetGroup(ci) == newGroup && removed < MATCH_COUNT) { removed++; return false; }
        return true;
      });
      // En mode gameGrid : révéler directement par paletteIdx du groupe
      if (currentGame.gameGrid) {
        if ((currentGame.remainingPerColor[newGroup]||0) > 0) {
          bjRevealColor(newGroup);
        }
      } else {
        currentGame.palette.forEach((_,idx) => {
          const cg = bjColorGroups[idx] >= 0 ? bjColorGroups[idx] : -1;
          if (cg == newGroup && (currentGame.remainingPerColor[idx]||0) > 0) {
            bjRevealColor(idx);
          }
        });
      }
      bjSetMsg('Match ! ✨');
      bjRenderWait();
      bjRenderGrid();
    }, 400);

    return;
  }

  bjSetMsg('Envoie 3 sauts identiques !');
}

function bjRevealColor(colorIndex) {
  const grid = currentGame.grid;
  const gridW = currentGame.gridW;
  const gridH = currentGame.gridH;
  const cellW = gameCanvas.width / gridW;
  const cellH = gameCanvas.height / gridH;
  const col = currentGame.palette[colorIndex];
  const colorRGB = col ? `rgb(${col.r},${col.g},${col.b})` : '#fff';

  // Collecter les cellules à révéler
  const cells = [];
  for (let y = 0; y < gridH; y++) {
    for (let x = 0; x < gridW; x++) {
      if (grid[y][x] === colorIndex) {
        grid[y][x] = -1;
        currentGame.revealed++;
        if (currentGame.remainingPerColor[colorIndex] > 0)
          currentGame.remainingPerColor[colorIndex]--;
        cells.push({ cx: x * cellW + cellW/2, cy: y * cellH + cellH/2 });
      }
    }
  }

  triggerHaptic('medium');
  bjSetMsg('Match ! Canon activé ! 🔫');
  updateGameUI();
  needsSave = true;

  if (!cells.length) { saveCurrentProgress(); checkCompletion(); return; }

  // 🔫 Fire via cannon
  cannonFireAtCells(cells, colorRGB, () => {
    saveCurrentProgress();
    checkCompletion();
  });
}

function bjCheckGameOver() {
  if (bjWait.length >= WAIT_MAX) {

    if (!Object.values(counts).some(v => v >= MATCH_COUNT)) {

      const gridEl = document.getElementById('blockJamGrid');
      if (gridEl) { gridEl.style.opacity='0.4'; gridEl.style.pointerEvents='none'; }

  }
}

// ==========================================
// 🔫 MULTI-CANNON CONVEYOR BELT (Bus Jam style)
// ==========================================
let conveyorSpeed = 0.4;
let conveyorAnimId = null;
let conveyorCannons = [];
let conveyorFiring = false;
const CANNON_WIDTH = 38;
const CANNON_GAP = 8;

let _cannonCanvasSized = false;
function conveyorResizeCanvas() {
  const c = document.getElementById('cannonCanvas');
  if (!c) return null;
  if (!_cannonCanvasSized) {
    const rect = c.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    c.width = Math.round(rect.width * dpr);
    c.height = Math.round(rect.height * dpr);
    _cannonCanvasSized = true;
  }
  return c;
}

function conveyorInitCannons() {
  conveyorCannons = [];
  if (!currentGame.palette) return;
  const colors = [];
  currentGame.palette.forEach((col, idx) => {
    if ((currentGame.remainingPerColor[idx] || 0) > 0) colors.push(idx);
  });
  // Positionner les canons centrés sur le tapis
  const beltW = _cachedBeltW;
  const totalW = colors.length * (CANNON_WIDTH + CANNON_GAP) - CANNON_GAP;
  const startX = (beltW - totalW) / 2 + CANNON_WIDTH / 2;

  colors.forEach((ci, i) => {
    const col = currentGame.palette[ci];
    conveyorCannons.push({
      colorIndex: ci,
      x: startX + i * (CANNON_WIDTH + CANNON_GAP),
      colorRGB: `rgb(${col.r},${col.g},${col.b})`,
      colorR: col.r, colorG: col.g, colorB: col.b,
      firing: false, dead: false, _fireDir: 1
    });
  });
}

function conveyorDraw() {
  const c = conveyorResizeCanvas();
  if (!c) return;
  const ctx = c.getContext('2d');
  const W = c.width; const H = c.height;
  const dpr = window.devicePixelRatio || 1;
  ctx.clearRect(0, 0, W, H);

  // Tapis
  ctx.fillStyle = '#d0d5e3';
  ctx.beginPath(); ctx.roundRect(0, 0, W, H, H * 0.25); ctx.fill();

  // Rails
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 1.5 * dpr;
  ctx.beginPath(); ctx.moveTo(0, H * 0.78); ctx.lineTo(W, H * 0.78); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, H * 0.88); ctx.lineTo(W, H * 0.88); ctx.stroke();

  // Canons
  const cw = CANNON_WIDTH * dpr;
  const ch = H * 0.6;

  conveyorCannons.forEach(cannon => {
    if (cannon.dead) return;
    const cx = cannon.x * dpr;
    const cy = H * 0.35;
    const r = cannon.colorR, g = cannon.colorG, b = cannon.colorB;

    // Ombre
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.beginPath(); ctx.ellipse(cx, H * 0.88, cw * 0.45, H * 0.05, 0, 0, Math.PI * 2); ctx.fill();

    // Roues
    ctx.fillStyle = '#555';
    ctx.beginPath(); ctx.arc(cx - cw * 0.25, H * 0.82, H * 0.07, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + cw * 0.25, H * 0.82, H * 0.07, 0, Math.PI * 2); ctx.fill();

    // Corps coloré
    const bg = ctx.createLinearGradient(cx, cy - ch/2, cx, cy + ch/2);
    bg.addColorStop(0, `rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`);
    bg.addColorStop(0.5, `rgb(${r},${g},${b})`);
    bg.addColorStop(1, `rgb(${Math.max(0,r-40)},${Math.max(0,g-40)},${Math.max(0,b-40)})`);
    ctx.fillStyle = bg;
    ctx.beginPath(); ctx.roundRect(cx - cw/2, cy - ch/2, cw, ch, cw * 0.2); ctx.fill();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.roundRect(cx - cw/2 + 3*dpr, cy - ch/2 + 2*dpr, cw - 6*dpr, ch * 0.3, 3*dpr); ctx.fill();

    // Tube
    const tubeW = cw * 0.3; const tubeH = ch * 0.55;
    ctx.fillStyle = `rgb(${Math.max(0,r-50)},${Math.max(0,g-50)},${Math.max(0,b-50)})`;
    ctx.beginPath(); ctx.roundRect(cx - tubeW/2, cy - ch/2 - tubeH + 4*dpr, tubeW, tubeH, [tubeW*0.3, tubeW*0.3, 0, 0]); ctx.fill();

    // Bouche
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.ellipse(cx, cy - ch/2 - tubeH + 6*dpr, tubeW * 0.3, tubeW * 0.2, 0, 0, Math.PI * 2); ctx.fill();

    // Flash si tir
    if (cannon.firing) {
      const flashR = tubeW * 0.7 + Math.random() * tubeW * 0.3;
      ctx.fillStyle = `rgba(255,230,100,${0.5+Math.random()*0.3})`;
      ctx.beginPath(); ctx.arc(cx, cy - ch/2 - tubeH + 3*dpr, flashR, 0, Math.PI * 2); ctx.fill();
    }
  });
}

function conveyorTick() {
  // Les canons sont en file centrée (Bus Jam style)
  const beltW = _cachedBeltW;
  const alive = conveyorCannons.filter(cn => !cn.dead);
  const totalW = alive.length * (CANNON_WIDTH + CANNON_GAP) - (alive.length > 0 ? CANNON_GAP : 0);
  const startX = (beltW - totalW) / 2 + CANNON_WIDTH / 2;

  let idx = 0;
  conveyorCannons.forEach(cannon => {
    if (cannon.dead) return;
    if (cannon.firing) { idx++; return; }
    const targetX = startX + idx * (CANNON_WIDTH + CANNON_GAP);
    // Glisser doucement vers la position cible
    cannon.x += (targetX - cannon.x) * 0.12;
    idx++;
  });

  conveyorDraw();
  conveyorAnimId = requestAnimationFrame(conveyorTick);
}

let _cachedBeltW = 400;

function cannonStart() {
  _cannonCanvasSized = false; // force resize au prochain draw
  conveyorInitCannons();
  if (conveyorAnimId) cancelAnimationFrame(conveyorAnimId);
  conveyorFiring = false;
  // Cache la largeur du tapis
  const c = document.getElementById('cannonCanvas');
  if (c) _cachedBeltW = c.getBoundingClientRect().width;
  conveyorTick();
}

function cannonStop() {
  if (conveyorAnimId) { cancelAnimationFrame(conveyorAnimId); conveyorAnimId = null; }
}

function cannonFireAtCells(cells, colorRGB, onAllLanded) {
  if (!cells.length) { onAllLanded(); return; }

  // Trouver le canon de cette couleur
  let firingCannon = conveyorCannons.find(c => !c.dead && c.colorRGB === colorRGB);
  if (!firingCannon) firingCannon = conveyorCannons.find(c => !c.dead);
  if (!firingCannon) { onAllLanded(); return; }

  firingCannon.firing = true;
  firingCannon._fireDir = 1;

  const cellW = gameCanvas.width / currentGame.gridW;
  const cellH = gameCanvas.height / currentGame.gridH;
  const revealR = Math.min(cellW, cellH) * 0.85;

  const particleCanvas = document.getElementById('gameCanvasParticles');
  if (!particleCanvas) { firingCannon.firing = false; onAllLanded(); return; }
  particleCanvas.width = gameCanvas.width;
  particleCanvas.height = gameCanvas.height;
  const ctxP = particleCanvas.getContext('2d');

  const sorted = [...cells].sort((a, b) => a.cx - b.cx);
  const TOTAL_DURATION = 3000;
  const startTime = performance.now();
  let revealedIdx = 0;
  const activeJets = [];
  const beltW = _cachedBeltW;

  function getCannonImageX() {
    return (firingCannon.x / beltW) * gameCanvas.width;
  }

  function animate(ts) {
    const elapsed = ts - startTime;
    const progress = Math.min(elapsed / TOTAL_DURATION, 1);

    // Canon reste sur place pendant le tir
    const cannonImgX = getCannonImageX();
    const totalToReveal = Math.floor(progress * sorted.length);

    while (revealedIdx < totalToReveal && revealedIdx < sorted.length) {
      let bestIdx = revealedIdx; let bestDist = Infinity;
      for (let i = revealedIdx; i < Math.min(revealedIdx + 15, sorted.length); i++) {
        const dist = Math.abs(sorted[i].cx - cannonImgX);
        if (dist < bestDist) { bestDist = dist; bestIdx = i; }
      }
      if (bestIdx !== revealedIdx) [sorted[revealedIdx], sorted[bestIdx]] = [sorted[bestIdx], sorted[revealedIdx]];

      const cell = sorted[revealedIdx];
      ctxScratch.globalCompositeOperation = 'destination-out';
      ctxScratch.beginPath(); ctxScratch.arc(cell.cx, cell.cy, revealR, 0, Math.PI * 2); ctxScratch.fill();
      ctxScratch.globalCompositeOperation = 'source-over';
      activeJets.push({ targetX: cell.cx, targetY: cell.cy, born: ts, life: 280 });
      revealedIdx++;
    }

    ctxP.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

    if (progress < 1) {
      for (let i = activeJets.length - 1; i >= 0; i--) {
        const jet = activeJets[i];
        const jp = Math.min((ts - jet.born) / jet.life, 1);
        if (jp >= 1) { activeJets.splice(i, 1); continue; }

        const jx = cannonImgX + (jet.targetX - cannonImgX) * jp;
        const arcH = gameCanvas.height * 0.18 + Math.abs(cannonImgX - jet.targetX) * 0.08;
        const jy = gameCanvas.height + (jet.targetY - gameCanvas.height) * jp - arcH * Math.sin(Math.PI * jp);
        const size = 4 * (1 - jp * 0.4);

        ctxP.globalAlpha = 0.75 * (1 - jp * 0.5);
        ctxP.fillStyle = colorRGB;
        ctxP.beginPath(); ctxP.arc(jx, jy, size, 0, Math.PI * 2); ctxP.fill();

        if (jp > 0.82) {
          ctxP.globalAlpha = 0.4 * (1 - jp);
          ctxP.fillStyle = 'white';
          ctxP.beginPath(); ctxP.arc(jet.targetX, jet.targetY, revealR * 0.5, 0, Math.PI * 2); ctxP.fill();
        }
      }
      ctxP.globalAlpha = 1;
      requestAnimationFrame(animate);
    } else {
      while (revealedIdx < sorted.length) {
        const cell = sorted[revealedIdx];
        ctxScratch.globalCompositeOperation = 'destination-out';
        ctxScratch.beginPath(); ctxScratch.arc(cell.cx, cell.cy, revealR, 0, Math.PI * 2); ctxScratch.fill();
        ctxScratch.globalCompositeOperation = 'source-over';
        revealedIdx++;
      }
      ctxP.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
      firingCannon.firing = false;
      firingCannon.dead = true;
      onAllLanded();
    }
  }

  setTimeout(() => requestAnimationFrame(animate), 100);
}

function bjInit() {
  bjWait = [];
  bjGameOver = false;
  bjAnimating = false;

  if (currentGame.gameGrid && currentGame.gameGrid.length > 0) {
    // Mode gameGrid du serveur — charger directement
    const gg = currentGame.gameGrid;
    bjRows = gg.length;
    bjCols = gg[0].length;
    bjGrid = [];
    for (let row = 0; row < bjRows; row++) {
      for (let col = 0; col < bjCols; col++) {
        bjGrid.push(gg[row][col]);
      }
    }
    // S'assurer que remainingPerColor est correct pour tous les paletteIdx présents
    // (recalculer depuis la grille image si nécessaire)
    if (!currentGame.remainingPerColor || currentGame.remainingPerColor.every(v => v === 0)) {
      const counts = new Array(currentGame.palette.length).fill(0);
      if (currentGame.grid) {
        for (let y = 0; y < currentGame.gridH; y++) {
          for (let x = 0; x < currentGame.gridW; x++) {
            const v = currentGame.grid[y][x];
            if (v >= 0 && v < counts.length) counts[v]++;
          }
        }
      }
      currentGame.remainingPerColor = counts;
    }
    // Initialiser bjColorGroups comme identité (chaque paletteIdx = son propre groupe)
    bjColorGroups = currentGame.palette.map((_, i) => i);
    bjGroupColors = currentGame.palette.map(c => [c.r, c.g, c.b]);
  } else {
    bjBuildGrid();
  }

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bjRenderGrid();
      bjRenderWait();
      bjSetMsg('Envoie 3 sauts identiques !');
      cannonStart(); // 🔫 Démarrer le canon
    });
  });
}

function launchFireworks(onDone) {
  const fw = document.createElement('canvas');
  fw.id = 'fwCanvas';
  fw.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;z-index:998;pointer-events:none;';
  fw.width = window.innerWidth;
  fw.height = window.innerHeight;
  document.body.appendChild(fw);
  const ctx = fw.getContext('2d');

  const COLORS = ['#FF4D6D','#FFD60A','#06D6A0','#4CC9F0','#F72585','#FF9E00','#ffffff','#c77dff'];
  let particles = [], rockets = [], animId = null;
  let allLaunched = false;

  function Particle(x, y, color) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 6;
    this.x = x; this.y = y;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.color = color; this.life = 1;
    this.decay = 0.010 + Math.random() * 0.016;
    this.size = 2.5 + Math.random() * 2.5;
    this.gravity = 0.10; this.trail = [];
  }

  function Rocket(x) {
    this.x = x; this.y = fw.height;
    this.vy = -(10 + Math.random() * 6);
    this.targetY = fw.height * 0.15 + Math.random() * fw.height * 0.35;
    this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.trail = []; this.exploded = false;
  }

  function explode(x, y, color) {
    for (let i = 0; i < 90; i++) particles.push(new Particle(x, y, color));
    for (let i = 0; i < 20; i++) {
      const p = new Particle(x, y, '#ffffff');
      p.size = 1.5; p.decay = 0.025; particles.push(p);
    }
  }

  function tick() {
    // Canvas transparent — on efface avec clearRect pour voir le jeu en dessous
    ctx.clearRect(0, 0, fw.width, fw.height);

    rockets.forEach(r => {
      if (r.exploded) return;
      r.trail.push({x: r.x, y: r.y});
      if (r.trail.length > 10) r.trail.shift();
      r.trail.forEach((t, i) => {
        ctx.globalAlpha = (i / r.trail.length) * 0.7;
        ctx.fillStyle = '#ffcc44';
        ctx.beginPath(); ctx.arc(t.x, t.y, 2, 0, Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha = 1; ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(r.x, r.y, 3, 0, Math.PI*2); ctx.fill();
      r.y += r.vy; r.vy *= 0.98;
      if (r.y <= r.targetY) { r.exploded = true; explode(r.x, r.y, r.color); }
    });

    particles.forEach(p => {
      p.trail.push({x: p.x, y: p.y, life: p.life});
      if (p.trail.length > 5) p.trail.shift();
      p.trail.forEach((t, i) => {
        ctx.globalAlpha = t.life * 0.4 * (i / p.trail.length);
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(t.x, t.y, p.size * 0.4, 0, Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2); ctx.fill();
      p.x += p.vx; p.y += p.vy; p.vy += p.gravity; p.vx *= 0.97; p.life -= p.decay;
    });

    ctx.globalAlpha = 1;
    particles = particles.filter(p => p.life > 0);

    const done = allLaunched && particles.length === 0 && rockets.every(r => r.exploded);
    if (!done) {
      animId = requestAnimationFrame(tick);
    } else {
      fw.remove();
      if (onDone) onDone();
    }
  }

  const w = fw.width;
  const launches = [
    [w*0.5, 0], [w*0.25, 200], [w*0.75, 300],
    [w*0.5, 500], [w*0.15, 600], [w*0.85, 700],
    [w*0.4, 900], [w*0.6, 1000], [w*0.5, 1100]
  ];
  launches.forEach(([x, delay], i) => {
    setTimeout(() => {
      rockets.push(new Rocket(x));
      if (!animId) tick();
      if (i === launches.length - 1) {
        // Dernière fusée lancée — marquer comme terminé après qu'elle explose
        setTimeout(() => { allLaunched = true; }, 1000);
      }
    }, delay);
  });
}

function finishLevel() {
  currentGame.completed = true;
  markLevelCompleted(currentGame.levelId);
  refreshGlobalProgressUI();
  saveCurrentProgress();
  triggerHaptic("heavy");

  // Feux d'artifice, puis overlay quand c'est fini
  launchFireworks(() => {
    const nextLvl = getNextLevel();
    if (nextLvl) {
      const endOverlay = document.getElementById("endOverlay");
      const endMsg = document.getElementById("endMsg");
      const btnEndBack = document.getElementById("btnEndBack");
      if (endMsg) endMsg.textContent = "Image complétée ! 🎉";
      if (btnEndBack) btnEndBack.textContent = "Niveau suivant →";
      if (endOverlay) endOverlay.style.display = "flex";
      if (window._autoNextTimeout) clearTimeout(window._autoNextTimeout);
      window._autoNextTimeout = setTimeout(() => {
        if (endOverlay) endOverlay.style.display = "none";
        startGame(currentGame.collectionId, nextLvl.id);
      }, 2000);

}

let activeCategory = null;

function buildCategoryTabs() {
  const container = document.getElementById("categoryTabs");
  container.innerHTML = "";

  LEVELS_DATA.collections.forEach(col => {
    const tab = document.createElement("div");
    tab.className = "categoryTab";
    tab.textContent = (col.emoji || "🎨") + " " + col.name;

    tab.addEventListener("click", () => {
      activeCategory = col.id;
      refreshCategoryTabsUI();
      buildHomeGallery();
    });

    container.appendChild(tab);
  });

  // auto-select first
  if (!activeCategory && LEVELS_DATA.collections.length > 0) {
    activeCategory = LEVELS_DATA.collections[0].id;
  }

  refreshCategoryTabsUI();
}

function refreshCategoryTabsUI() {
  document.querySelectorAll(".categoryTab").forEach((tab, idx) => {
    const col = LEVELS_DATA.collections[idx];
    if (col.id === activeCategory) tab.classList.add("active");
    else tab.classList.remove("active");
  });
}

async function buildHomeGallery() {
  const grid = document.getElementById("homeGalleryGrid");
  grid.innerHTML = "";

  const col = LEVELS_DATA.collections.find(c => c.id === activeCategory);
  if (!col) return;

  (col.levels || []).forEach(async lvl => {
    const item = document.createElement("div");
    item.className = "galleryItem";

    const canvas = document.createElement("canvas");
canvas.dataset.levelThumb = lvl.id;

    canvas.width = 300;
    canvas.height = 300;

    const title = document.createElement("div");
    title.className = "galleryItemTitle";
    title.textContent = lvl.title || lvl.id;

    item.appendChild(canvas);
    item.appendChild(title);

    item.addEventListener("click", () => {
      startGame(col.id, lvl.id);
    });

    grid.appendChild(item);

    await drawLevelThumbnail(canvas, col.id, lvl.id);
  });
}

<script>
// ======== WEBAUDIO SCRATCH ENGINE ========
let audioCtx = null;
let scratchBuffer = null;

async function initScratchAudio() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const res = await fetch("sounds/sound_scratch.mp3");
    const arrayBuffer = await res.arrayBuffer();
    scratchBuffer = await audioCtx.decodeAudioData(arrayBuffer);
  } catch (e) {
    console.warn("initScratchAudio error", e);
  }
}

function playScratchAudio() {
  if (!scratchBuffer || !audioCtx) return;
  const source = audioCtx.createBufferSource();
  source.buffer = scratchBuffer;
  source.connect(audioCtx.destination);
  source.start(0);
}

const sndSelect = document.getElementById('sndSelect');
let lastScratchSound = 0;

function playScratchSound() {
  const now = performance.now();
  if (now - lastScratchSound < 80) return;
  lastScratchSound = now;
  playScratchAudio();
}

// Son de sélection de couleur
document.addEventListener('click', (e)=>{
  if(e.target.classList.contains('dot')) {
    try {
      if (sndSelect) {
        sndSelect.currentTime = 0;
        sndSelect.play();
      }
    } catch(e){}
  }
});

// Débloque l'audio sur iOS au premier toucher
document.addEventListener("touchstart", () => {
  if (audioCtx && audioCtx.state === "suspended") {
    audioCtx.resume();
  }
}, { once: true });
</script>
