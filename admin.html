<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin — Reveal Colors</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #f5f5f5; margin: 0; padding: 16px; }
h1 { font-size: 20px; color: #ff6fb5; margin-bottom: 16px; }
.collection { background: white; border-radius: 12px; padding: 12px 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.col-title { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 8px; }
.level-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-top: 1px solid #f0f0f0; }
.level-thumb { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; background: #eee; }
.level-info { flex: 1; font-size: 13px; color: #555; }
.level-id { font-size: 11px; color: #aaa; }
.btn-del { background: #ff4d6d; color: white; border: none; border-radius: 6px; padding: 4px 10px; font-size: 12px; cursor: pointer; }
.btn-del:hover { background: #cc2a49; }
#status { font-size: 13px; color: #888; margin-bottom: 12px; }
.empty { color: #aaa; font-size: 13px; padding: 8px 0; }
</style>
</head>
<body>
<h1>Admin — Reveal Colors</h1>
<div id="status">Chargement...</div>
<div id="content"></div>

<script src="idb.js"></script>
<script>
async function loadAdmin() {
  const cfg = await rcGetConfig();
  const content = document.getElementById('content');
  const status = document.getElementById('status');

  const total = cfg.collections.reduce((s, c) => s + c.levels.length, 0);
  status.textContent = `${cfg.collections.length} catégorie(s), ${total} niveau(x)`;

  if (!cfg.collections.length) {
    content.innerHTML = '<div class="empty">Aucun niveau publié.</div>';
    return;
  }

  content.innerHTML = '';
  for (const col of cfg.collections) {
    const div = document.createElement('div');
    div.className = 'collection';
    div.innerHTML = `<div class="col-title">${col.emoji || '🎨'} ${col.name} (${col.id})</div>`;

    if (!col.levels.length) {
      div.innerHTML += '<div class="empty">Aucun niveau.</div>';
    }

    for (const lvl of col.levels) {
      const row = document.createElement('div');
      row.className = 'level-row';

      const img = document.createElement('img');
      img.className = 'level-thumb';
      rcGetImage(lvl.id).then(b64 => { if (b64) img.src = b64; });

      const info = document.createElement('div');
      info.className = 'level-info';
      info.innerHTML = `<strong>${lvl.title}</strong><br><span class="level-id">${lvl.id}</span>`;

      const btn = document.createElement('button');
      btn.className = 'btn-del';
      btn.textContent = 'Supprimer';
      btn.onclick = async () => {
        if (!confirm(`Supprimer "${lvl.title}" ?`)) return;
        await rcDeleteLevel(col.id, lvl.id);
        loadAdmin();
      };

      row.appendChild(img);
      row.appendChild(info);
      row.appendChild(btn);
      div.appendChild(row);
    }
    content.appendChild(div);
  }
}

loadAdmin();
</script>
</body>
</html>
