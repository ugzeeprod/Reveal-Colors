<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Admin - Niveaux publiés</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background:#fafafa; }
    h1 { margin-bottom: 10px; }
    .category { margin-top: 25px; }
    .level {
      display: flex; 
      align-items: center; 
      gap: 12px; 
      padding: 10px;
      background: white;
      border-radius: 10px;
      margin-bottom: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; }
    .no-img { width:80px;height:80px;background:#ddd;border-radius:8px;flex-shrink:0; }
    button {
      background: #e75151;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #c93636; }
    #reload { margin-bottom: 20px; background:#4353a5; }
    #reload:hover { background:#2d3a8c; }
    .empty { color: #aaa; font-size: 13px; padding: 8px 0; }
  </style>
</head>
<body>

  <h1>📁 Niveaux publiés</h1>
  <button id="reload">🔄 Recharger la liste</button>
  <div id="content"></div>

<script src="idb.js"></script>
<script>
async function loadLevels() {
  const content = document.getElementById("content");
  content.innerHTML = "<p>Chargement...</p>";

  const cfg = await rcGetConfig();
  content.innerHTML = "";

  if (!cfg.collections.length) {
    content.innerHTML = '<p class="empty">Aucun niveau publié.</p>';
    return;
  }

  for (const col of cfg.collections) {
    const catDiv = document.createElement("div");
    catDiv.className = "category";
    catDiv.innerHTML = `<h2>${col.emoji || '🎨'} ${col.name}</h2>`;

    if (!col.levels.length) {
      catDiv.innerHTML += '<p class="empty">Aucun niveau.</p>';
    }

    for (const lvl of col.levels) {
      const lvlDiv = document.createElement("div");
      lvlDiv.className = "level";

      // Image depuis IndexedDB
      const imgEl = document.createElement('div');
      imgEl.className = 'no-img';
      rcGetImage(lvl.id).then(b64 => {
        if (b64) {
          const img = document.createElement('img');
          img.src = b64;
          lvlDiv.replaceChild(img, imgEl);
        }
      });

      const info = document.createElement('div');
      info.style.flex = '1';
      info.innerHTML = `<strong>${lvl.title}</strong><br><small>ID : ${lvl.id} — Catégorie : ${col.id}</small>`;

      const btn = document.createElement('button');
      btn.innerHTML = '🗑 Supprimer';
      btn.onclick = () => deleteLevel(col.id, lvl.id);

      lvlDiv.appendChild(imgEl);
      lvlDiv.appendChild(info);
      lvlDiv.appendChild(btn);
      catDiv.appendChild(lvlDiv);
    }

    content.appendChild(catDiv);
  }
}

async function deleteLevel(categoryId, levelId) {
  if (!confirm("Supprimer ce niveau ?")) return;
  await rcDeleteLevel(categoryId, levelId);
  loadLevels();
}

document.getElementById("reload").onclick = loadLevels;
loadLevels();
</script>

</body>
</html>
